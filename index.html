async function renderUserExpenses(content) {
  const u = currentUser;
  let expenses = [];
  try {
    expenses = await apiFetch(`/expenses/${u.id}`);
    expenses = expenses.slice().sort((a,b) => new Date(b.data) - new Date(a.data));
  } catch(e) { content.innerHTML = `<div class="empty-state">Errore caricamento spese</div>`; return; }

  // Group by month
  const byMonth = {};
  expenses.forEach(e => {
    const d = new Date(e.data);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleDateString('it-IT', {month:'long', year:'numeric'});
    if(!byMonth[key]) byMonth[key] = { label, items: [] };
    byMonth[key].items.push(e);
  });

  // Deadline warning: check if today is last 3 days of month
  const now = new Date();
  const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const isEndOfMonth = now.getDate() >= lastDay - 2;
  const deadlineExtra = isEndOfMonth
    ? `<strong> ⚠️ Attenzione: oggi è il ${now.getDate()} — siamo a fine mese! Inserisci subito le tue spese.</strong>`
    : '';

  content.innerHTML = `
    <div class="card">
      <div class="card-title">🚗 Spese Auto</div>

      <!-- WARNING BANNER -->
      <div class="expense-warning">
        <div class="warn-icon">⚠️</div>
        <div class="warn-text">
          Attenzione: le spese devono essere inserite entro l'ultimo giorno del mese.<br>
          Dopo tale termine non potranno essere conteggiate.${deadlineExtra}
        </div>
      </div>

      <!-- FORM INSERIMENTO -->
      <div class="expense-form-wrap">
        <div class="expense-form-title">➕ Inserisci Nuova Spesa</div>
        <div class="form-grid" style="margin-bottom:14px">
          <div class="field-group full">
            <div class="field-label">📍 Luogo del Servizio</div>
            <input class="field-input" id="exp-luogo"
              placeholder="Inserisci dove hai svolto il servizio...">
          </div>
          <div class="field-group">
            <div class="field-label">📅 Data del Servizio</div>
            <input class="field-input" type="date" id="exp-data"
              value="${now.toISOString().split('T')[0]}"
              max="${now.toISOString().split('T')[0]}">
          </div>
          <div class="field-group" style="display:flex;flex-direction:column;justify-content:flex-end">
            <div class="field-label">🚗 Modalità Trasporto (mezzo proprio)</div>
            <div style="display:flex;gap:10px;margin-top:8px">
              <button type="button" id="solo-si" onclick="setSolo(true)"
                style="flex:1;padding:10px;border-radius:8px;border:2px solid var(--border);background:var(--bg3);color:var(--text-muted);font-weight:700;cursor:pointer;font-size:13px">
                ✅ Sì
              </button>
              <button type="button" id="solo-no" onclick="setSolo(false)"
                style="flex:1;padding:10px;border-radius:8px;border:2px solid var(--border-gold);background:rgba(201,162,39,0.1);color:var(--gold);font-weight:700;cursor:pointer;font-size:13px">
                ❌ No
              </button>
            </div>
          </div>
        </div>
        <div class="field-group" style="margin-bottom:16px">
          <div class="field-label">📝 Note — Scrivi eventuali note da comunicare</div>
          <textarea class="field-input" id="exp-note" style="min-height:80px"
            placeholder="Eventuali note, segnalazioni o comunicazioni aggiuntive..."></textarea>
        </div>
        <button class="btn-sm btn-primary" onclick="submitExpense()" style="padding:10px 28px">
          💾 Salva Spesa
        </button>
      </div>

      <!-- LISTA SPESE -->
      <div class="card-title" style="margin-bottom:16px">
        📋 Le Tue Spese (${expenses.length} totali)
      </div>
      ${Object.keys(byMonth).length === 0
        ? `<div class="empty-expenses">
            <div style="font-size:40px;margin-bottom:12px;opacity:0.3">🚗</div>
            Nessuna spesa inserita ancora
          </div>`
        : Object.keys(byMonth).sort((a,b)=>b.localeCompare(a)).map(key => `
          <div class="exp-month-header">📆 ${byMonth[key].label}</div>
          <div class="expense-list" style="margin-bottom:20px">
            ${byMonth[key].items.map(e => `
              <div class="expense-item" id="exp-item-${e.id}">
                <div class="expense-item-header">
                  <div>
                    <div class="expense-luogo">📍 ${e.luogo}</div>

                      ? `<div class="expense-solo-badge">🚗 Andato da solo</div>`

                ${e.note ? `<div class="expense-note">💬 ${e.note}</div>` : ''}

let soloChecked = false;
function setSolo(val) {
  soloChecked = val;
  const si = document.getElementById('solo-si');
  const no = document.getElementById('solo-no');
  if(!si || !no) return;
  if(val) {
    si.style.borderColor = 'var(--border-gold)'; si.style.background = 'rgba(201,162,39,0.15)'; si.style.color = 'var(--gold)';
    no.style.borderColor = 'var(--border)'; no.style.background = 'var(--bg3)'; no.style.color = 'var(--text-muted)';
  } else {
    no.style.borderColor = 'var(--border-gold)'; no.style.background = 'rgba(201,162,39,0.1)'; no.style.color = 'var(--gold)';
    si.style.borderColor = 'var(--border)'; si.style.background = 'var(--bg3)'; si.style.color = 'var(--text-muted)';
  }
}

async function submitExpense() {
  const luogo = document.getElementById('exp-luogo')?.value.trim();
  const data  = document.getElementById('exp-data')?.value;
  const note  = document.getElementById('exp-note')?.value.trim() || '';
  const soloGuida = soloChecked;
  if(!luogo) { showToast('Inserisci il luogo del servizio', 'error'); return; }
  if(!data)  { showToast('Inserisci la data del servizio', 'error'); return; }
  try {
    await apiFetch('/expenses', { method:'POST', body: JSON.stringify({luogo, data, solo_guida: soloGuida, note}) });
    soloChecked = false; setSolo(false);
    showToast('Spesa salvata ✓');
    renderUserExpenses(document.getElementById('content'));
  } catch(e) { showToast('Errore salvataggio', 'error'); }
}

          <div>
            <div class="solo-label">Sono andato da solo!</div>
            <div class="solo-sublabel">Mezzo proprio</div>
          </div>
        </label>
      </div>
    </div>
    <div class="field-group" style="margin-bottom:20px">
      <div class="field-label">📝 Note</div>
      <textarea class="field-input" id="edit-exp-note" style="min-height:80px">${e.note||''}</textarea>
    </div>
    <div class="btn-row">

      <button class="btn-sm btn-secondary" onclick="closeModalDirect()">Annulla</button>
    </div>
  `);
  window._editSolo = soloGuida;
  } catch(e) { showToast('Errore', 'error'); }
}

function toggleEditSolo() {
  window._editSolo = !window._editSolo;
  const wrap = document.getElementById('edit-solo-wrap');
  const icon = document.getElementById('edit-solo-icon');
  if(!wrap||!icon) return;
  if(window._editSolo) { wrap.classList.add('checked'); icon.textContent='✓'; }
  else { wrap.classList.remove('checked'); icon.textContent=''; }
}

async function saveExpenseEdit(id) {
  const luogo = document.getElementById('edit-exp-luogo').value.trim();
  const data  = document.getElementById('edit-exp-data').value;
  const note  = document.getElementById('edit-exp-note').value.trim();
  const soloGuida = window._editSolo || false;
  if(!luogo) { showToast('Inserisci il luogo','error'); return; }
  if(!data)  { showToast('Inserisci la data','error'); return; }
  try {
    await apiFetch(`/expenses/${id}`, { method:'PUT', body: JSON.stringify({luogo, data, solo_guida: soloGuida, note}) });
    closeModalDirect();
    showToast('Spesa aggiornata ✓');
    if(currentUser.is_admin) renderAdminExpenses(document.getElementById('content'));
    else renderUserExpenses(document.getElementById('content'));
  } catch(e) { showToast('Errore', 'error'); }
}

function deleteExpense(id) {
  openModal(`
    <div class="modal-title">
      <span>🗑 Elimina Spesa</span>
      <span class="modal-close" onclick="closeModalDirect()">✕</span>
    </div>
    <p style="color:var(--text-muted);font-size:14px;line-height:1.6;margin-bottom:20px">

}

async function confirmDeleteExpense(id) {

  const totalExp    = allExpenses.length;
  const totalPagato = allExpenses.filter(e => e.pagato).length;
  const totalDaPagare = totalExp - totalPagato;

  // Group by YYYY-MM for full history

    const d    = new Date(e.data);
    const key  = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
    if (!byMonth[key]) byMonth[key] = { label, items: [] };
    byMonth[key].items.push(e);
  });
  const sortedMonths = Object.keys(byMonth).sort((a, b) => b.localeCompare(a));

  // Search results
  let searchResults = [];
  if (query) {
    searchResults = users.filter(u =>
      `${u.nome} ${u.cognome}`.toLowerCase().includes(query) ||
      u.email.toLowerCase().includes(query)
    );
  }

  content.innerHTML = `
    <div class="card" style="border-color:var(--border-gold)">
      <div class="card-title">🚗 Gestione Spese Auto — Riepilogo Generale</div>

      <!-- EXPORT BAR -->
      <div class="export-bar">

async function togglePagato(userId, expId, fromSearch, searchQuery) {
  try {
    await apiFetch(`/expenses/${expId}/pagato`, { method: 'PATCH', body: JSON.stringify({}) });
    const content = document.getElementById('content');
    if (fromSearch) {
      await renderAdminExpenses(content, searchQuery);
      setTimeout(() => {
        const inp = document.getElementById('exp-search-input');
        if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
      }, 50);
    } else {
      await renderAdminExpenses(content, '');
    }
    showToast('Stato spesa aggiornato ✓', 'success');
  } catch(e) { showToast('Errore aggiornamento spesa', 'error'); }
}

async function getAllExpensesFlat() {
  const allExpenses = await apiFetch('/expenses');
  const rows = allExpenses.map(e => ({
    cognome:   e.cognome,
    nome:      e.nome,
    email:     e.email,
    data:      e.data,
    luogo:     e.luogo,
    solo:      (e.solo_guida || e.soloGuida) ? 'Sì' : 'No',
    note:      e.note || '',
    pagato:    e.pagato ? 'Conteggiata' : 'Da conteggiare',
    userId:    e.user_id,
    expId:     e.id
  }));
  return rows.sort((a, b) => b.data.localeCompare(a.data));
}

function getMonthLabel(dateStr) {
  return new Date(dateStr + '-01').toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
}

// ---- PDF EXPORT ----
async function exportExpensesPDF() {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) { showToast('Libreria PDF non disponibile','error'); return; }

  const rows = await getAllExpensesFlat();
  const doc  = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const W    = doc.internal.pageSize.getWidth();
  const H    = doc.internal.pageSize.getHeight();
  const now  = new Date().toLocaleDateString('it-IT', { day:'2-digit', month:'long', year:'numeric' });

  // ---- Background & Header band ----
  doc.setFillColor(6, 6, 8);
  doc.rect(0, 0, W, H, 'F');

  doc.setFillColor(15, 12, 0);
  doc.rect(0, 0, W, 36, 'F');

  // Gold top line
  doc.setDrawColor(201, 162, 39);
  doc.setLineWidth(1.2);
  doc.line(0, 36, W, 36);

  // Logo placeholder — AD monogram
  doc.setFillColor(201, 162, 39);
  doc.roundedRect(10, 5, 26, 26, 3, 3, 'F');
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text('AD', 23, 21, { align: 'center' });

  // Title
  doc.setTextColor(201, 162, 39);
  doc.setFontSize(17);
  doc.setFont('helvetica', 'bold');
  doc.text('ALFA SECURITY', 42, 14);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(180, 160, 100);
  doc.text('Spese di Trasporto Operatori', 42, 21);

  // Date right
  doc.setFontSize(9);
  doc.setTextColor(130, 120, 80);
  doc.text(`Generato il ${now}`, W - 12, 14, { align: 'right' });

  // Stats summary row
  const total     = rows.length;
  const pagate    = rows.filter(r => r.pagato === 'Conteggiata').length;
  const daPagare  = total - pagate;
  doc.setFontSize(8.5);
  doc.setTextColor(180, 160, 80);
  doc.text(`Totale spese: ${total}   |   Conteggiate in paga: ${pagate}   |   Da conteggiare: ${daPagare}`, 42, 30);

  // ---- Group by month ----
  const byMonth = {};
  rows.forEach(r => {
    const key = r.data.substring(0, 7);
    if (!byMonth[key]) byMonth[key] = [];
    byMonth[key].push(r);
  });

  let startY = 44;

  Object.keys(byMonth).sort((a,b) => b.localeCompare(a)).forEach(mKey => {
    const mRows   = byMonth[mKey];
    const mLabel  = getMonthLabel(mKey).toUpperCase();
    const mPagate = mRows.filter(r => r.pagato === 'Conteggiata').length;

    // Month header band
    doc.setFillColor(20, 16, 0);
    doc.rect(10, startY, W - 20, 8, 'F');
    doc.setDrawColor(201, 162, 39);
    doc.setLineWidth(0.4);
    doc.rect(10, startY, W - 20, 8, 'S');

    doc.setTextColor(201, 162, 39);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text(`📆  ${mLabel}`, 14, startY + 5.5);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(140, 120, 60);
    doc.text(
      `${mRows.length} spese  |  ${mPagate} conteggiate  |  ${mRows.length - mPagate} da conteggiare`,
      W - 14, startY + 5.5, { align: 'right' }
    );

    startY += 10;

    // Table
    doc.autoTable({
      startY,
      margin: { left: 10, right: 10 },
      head: [[ 'Cognome', 'Nome', 'Email', 'Data', 'Luogo Servizio', 'Solo', 'Note', 'In Paga' ]],
      body: mRows.map(r => [
        r.cognome, r.nome, r.email,
        new Date(r.data).toLocaleDateString('it-IT'),
        r.luogo, r.solo, r.note, r.pagato
      ]),
      styles: {
        font: 'helvetica', fontSize: 8,
        textColor: [220, 210, 180],
        fillColor: [14, 14, 18],
        lineColor: [40, 38, 30],
        lineWidth: 0.3
      },
      headStyles: {
        fillColor: [30, 24, 4],
        textColor: [201, 162, 39],
        fontStyle: 'bold', fontSize: 8.5,
        halign: 'center'
      },
      alternateRowStyles: { fillColor: [18, 17, 12] },
      columnStyles: {
        0: { cellWidth: 22 },
        1: { cellWidth: 20 },
        2: { cellWidth: 40 },
        3: { cellWidth: 22, halign: 'center' },
        4: { cellWidth: 'auto' },
        5: { cellWidth: 14, halign: 'center' },
        6: { cellWidth: 40 },
        7: { cellWidth: 26, halign: 'center',
          fontStyle: 'bold',
          textColor: (cell) => cell.raw === 'Conteggiata' ? [46, 204, 113] : [231, 76, 60]
        }
      },
      didParseCell(data) {
        if (data.column.index === 7) {
          data.cell.styles.textColor = data.cell.raw === 'Conteggiata' ? [46,204,113] : [231,76,60];
          data.cell.styles.fontStyle = 'bold';
        }
      },
      willDrawPage(data) {
        // Repeat dark background on each page
        doc.setFillColor(6, 6, 8);
        doc.rect(0, 0, W, H, 'F');
        // Footer gold line
        doc.setDrawColor(201, 162, 39);
        doc.setLineWidth(0.6);
        doc.line(10, H - 12, W - 10, H - 12);
        doc.setFontSize(7.5);
        doc.setTextColor(130, 120, 80);
        doc.text('AD Security — Documento riservato — Uso interno', 14, H - 7);
        doc.text(`Pagina ${data.pageNumber}`, W - 14, H - 7, { align: 'right' });
      }
    });

    startY = doc.lastAutoTable.finalY + 10;

    // New page if too close to bottom
    if (startY > H - 30 && Object.keys(byMonth).indexOf(mKey) < Object.keys(byMonth).length - 1) {
      doc.addPage();
      doc.setFillColor(6, 6, 8);
      doc.rect(0, 0, W, H, 'F');
      startY = 14;
    }
  });

  const filename = `AlfaSecurity_SpeseAuto_${new Date().toISOString().split('T')[0]}.pdf`;
  doc.save(filename);
  showToast('PDF salvato sul desktop ✓');
}

// ---- GOOGLE SHEETS (XLSX) EXPORT ----
async function exportExpensesSheets() {
  if (!window.XLSX) { showToast('Libreria XLSX non disponibile','error'); return; }

  const rows = await getAllExpensesFlat();
  const wb   = XLSX.utils.book_new();

  // ---- Sheet 1: Full data ----
  const headers = ['Cognome','Nome','Email','Data','Luogo Servizio','Solo','Note','Stato Pagamento'];
  const sheetData = [headers, ...rows.map(r => [
    r.cognome, r.nome, r.email,
    r.data,
    r.luogo, r.solo, r.note, r.pagato
  ])];
  const ws1 = XLSX.utils.aoa_to_sheet(sheetData);

  // Column widths
  ws1['!cols'] = [
    {wch:16},{wch:14},{wch:30},{wch:14},
    {wch:40},{wch:8},{wch:40},{wch:20}
  ];

  // Style header row (limited in xlsx.js without pro)
  XLSX.utils.book_append_sheet(wb, ws1, 'Spese Auto - Completo');

  // ---- Sheet 2: Monthly summary ----
  const byMonth = {};
  rows.forEach(r => {
    const key = r.data.substring(0,7);
    if (!byMonth[key]) byMonth[key] = { label: getMonthLabel(key), total:0, pagate:0, daPagare:0, operatori:{} };
    byMonth[key].total++;
    if (r.pagato === 'Conteggiata') byMonth[key].pagate++;
    else byMonth[key].daPagare++;
    const opKey = `${r.cognome} ${r.nome}`;
    if (!byMonth[key].operatori[opKey]) byMonth[key].operatori[opKey] = 0;
    byMonth[key].operatori[opKey]++;
  });

  const summaryData = [
    ['Alfa Security — Riepilogo Mensile Spese di Trasporto'],
    [],
    ['Mese','Totale Spese','Conteggiate in Paga','Da Conteggiare'],
    ...Object.keys(byMonth).sort((a,b)=>b.localeCompare(a)).map(k => [
      byMonth[k].label,
      byMonth[k].total,
      byMonth[k].pagate,
      byMonth[k].daPagare
    ]),
    [],
    ['Generato il', new Date().toLocaleDateString('it-IT')]
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(summaryData);
  ws2['!cols'] = [{wch:22},{wch:16},{wch:22},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Riepilogo Mensile');

  // ---- Sheet 3: Per operator ----
  const byOp = {};
  rows.forEach(r => {
    const k = `${r.cognome} ${r.nome}`;
    if (!byOp[k]) byOp[k] = { email: r.email, total:0, pagate:0, rows:[] };
    byOp[k].total++;
    if (r.pagato === 'Conteggiata') byOp[k].pagate++;
    byOp[k].rows.push(r);
  });
  const opData = [
    ['Alfa Security — Riepilogo per Operatore'],
    [],
    ['Operatore','Email','Totale Spese','Conteggiate','Da Conteggiare'],
    ...Object.keys(byOp).sort().map(k => [
      k, byOp[k].email, byOp[k].total, byOp[k].pagate, byOp[k].total - byOp[k].pagate
    ])
  ];
  const ws3 = XLSX.utils.aoa_to_sheet(opData);
  ws3['!cols'] = [{wch:24},{wch:30},{wch:16},{wch:16},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Per Operatore');

  const filename = `AlfaSecurity_SpeseAuto_${new Date().toISOString().split('T')[0]}.xlsx`;
  XLSX.writeFile(wb, filename);
  showToast('File Google Sheets salvato sul desktop ✓');
}

function connectGoogleDrive() {
  const clientId = document.getElementById('gdrive-client-id')?.value.trim();
  if (!clientId) { showToast('Inserisci il Client ID', 'error'); return; }
  GDRIVE.clientId = clientId;

  const redirectUri = window.location.origin + window.location.pathname;
  const scope       = 'https://www.googleapis.com/auth/drive.file';
  const authUrl     = `https://accounts.google.com/o/oauth2/v2/auth`
    + `?client_id=${encodeURIComponent(clientId)}`
    + `&redirect_uri=${encodeURIComponent(redirectUri)}`
    + `&response_type=token`
    + `&scope=${encodeURIComponent(scope)}`
    + `&prompt=select_account`;

  // Store clientId for after redirect
  sessionStorage.setItem('gdrive_client_id', clientId);
  sessionStorage.setItem('gdrive_pending', '1');

  const popup = window.open(authUrl, 'gdrive_auth',
    'width=520,height=620,left=200,top=100');

  // Poll for redirect with token
  const poll = setInterval(() => {
    try {
      if (!popup || popup.closed) { clearInterval(poll); return; }
      const hash = popup.location.hash;
      if (hash && hash.includes('access_token')) {
        clearInterval(poll);
        popup.close();
        const params = new URLSearchParams(hash.substring(1));
        GDRIVE.accessToken = params.get('access_token');
        GDRIVE.tokenExpiry = new Date(Date.now() + parseInt(params.get('expires_in')) * 1000);
        GDRIVE.clientId    = clientId;
        sessionStorage.removeItem('gdrive_pending');
        openDriveModal();
        showToast('Google Drive connesso ✓');
      }
    } catch(e) { /* cross-origin, still loading */ }
  }, 500);
}

async function driveUpload(format) {
  if (!GDRIVE.accessToken) { showToast('Connetti prima Google Drive', 'error'); return; }

  const btn = document.querySelector(`[onclick="driveUpload('${format}')"]`);
  if (btn) btn.innerHTML = `<span class="export-spinner"></span> Caricamento...`;

  try {
    let blob, filename, mimeType;
    const dateStr = new Date().toISOString().split('T')[0];

    if (format === 'pdf') {
      const { jsPDF } = window.jspdf;
      // Re-use the same PDF generation but return blob
      blob     = await generatePDFBlob();
      filename = `AlfaSecurity_SpeseAuto_${dateStr}.pdf`;
      mimeType = 'application/pdf';
    } else {
      blob     = await generateXLSXBlob();
      filename = `AlfaSecurity_SpeseAuto_${dateStr}.xlsx`;
      mimeType = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
    }

    // Multipart upload to Google Drive
    const boundary = '-------AlfaSecurity' + Date.now();
    const meta     = JSON.stringify({ name: filename, mimeType });
    const body     = buildMultipartBody(boundary, meta, mimeType, await blob.arrayBuffer());

    const resp = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
      {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${GDRIVE.accessToken}`,
          'Content-Type': `multipart/related; boundary="${boundary}"`
        },
        body
      }
    );

    if (!resp.ok) throw new Error(await resp.text());
    const file = await resp.json();
    closeModalDirect();
    showToast(`✅ Caricato su Drive: ${filename}`);

    // Also trigger local download
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);

  } catch(err) {
    console.error(err);
    if (err.message?.includes('401')) {
      GDRIVE.accessToken = null;
      showToast('Sessione Drive scaduta. Riconnetti.', 'error');
      openDriveModal();
    } else {
      showToast('Errore upload su Drive: ' + err.message, 'error');
    }
    if (btn) btn.innerHTML = format === 'pdf' ? '📄 Carica PDF su Drive' : '📊 Carica Google Sheets su Drive';
  }
}

function buildMultipartBody(boundary, metaJson, mimeType, fileBuffer) {
  const enc     = new TextEncoder();
  const metaPart = enc.encode(
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${metaJson}\r\n`
  );
  const filePart = enc.encode(`--${boundary}\r\nContent-Type: ${mimeType}\r\n\r\n`);
  const end      = enc.encode(`\r\n--${boundary}--`);
  const combined = new Uint8Array(metaPart.length + filePart.length + fileBuffer.byteLength + end.length);
  let offset = 0;
  combined.set(metaPart, offset); offset += metaPart.length;
  combined.set(filePart, offset); offset += filePart.length;
  combined.set(new Uint8Array(fileBuffer), offset); offset += fileBuffer.byteLength;
  combined.set(end, offset);
  return combined.buffer;
}

async function generatePDFBlob() {
  const { jsPDF } = window.jspdf;
  const rows = await getAllExpensesFlat();
  const doc  = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const now = new Date().toLocaleDateString('it-IT', {day:'2-digit',month:'long',year:'numeric'});
  doc.setFillColor(6,6,8); doc.rect(0,0,W,H,'F');
  doc.setFillColor(15,12,0); doc.rect(0,0,W,36,'F');
  doc.setDrawColor(201,162,39); doc.setLineWidth(1.2); doc.line(0,36,W,36);
  doc.setFillColor(201,162,39); doc.roundedRect(10,5,26,26,3,3,'F');
  doc.setTextColor(0,0,0); doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text('AD',23,21,{align:'center'});
  doc.setTextColor(201,162,39); doc.setFontSize(17); doc.setFont('helvetica','bold');
  doc.text('ALFA SECURITY',42,14);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.setTextColor(180,160,100); doc.text('Spese di Trasporto Operatori',42,21);
  doc.setFontSize(9); doc.setTextColor(130,120,80);
  doc.text(`Generato il ${now}`, W-12, 14, {align:'right'});
  const total=rows.length, pagate=rows.filter(r=>r.pagato==='Conteggiata').length;
  doc.setFontSize(8.5); doc.setTextColor(180,160,80);
  doc.text(`Totale: ${total}  |  Conteggiate: ${pagate}  |  Da conteggiare: ${total-pagate}`,42,30);
  const byMonth={};
  rows.forEach(r=>{const k=r.data.substring(0,7);if(!byMonth[k])byMonth[k]=[];byMonth[k].push(r);});
  let startY=44;
  Object.keys(byMonth).sort((a,b)=>b.localeCompare(a)).forEach(mKey=>{
    const mRows=byMonth[mKey];
    doc.setFillColor(20,16,0); doc.rect(10,startY,W-20,8,'F');
    doc.setDrawColor(201,162,39); doc.setLineWidth(0.4); doc.rect(10,startY,W-20,8,'S');
    doc.setTextColor(201,162,39); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(getMonthLabel(mKey).toUpperCase(),14,startY+5.5);
    startY+=10;
    doc.autoTable({
      startY, margin:{left:10,right:10},
      head:[['Cognome','Nome','Email','Data','Luogo','Solo','Note','In Paga']],
      body:mRows.map(r=>[r.cognome,r.nome,r.email,new Date(r.data).toLocaleDateString('it-IT'),r.luogo,r.solo,r.note,r.pagato]),
      styles:{font:'helvetica',fontSize:8,textColor:[220,210,180],fillColor:[14,14,18],lineColor:[40,38,30],lineWidth:0.3},
      headStyles:{fillColor:[30,24,4],textColor:[201,162,39],fontStyle:'bold',fontSize:8.5,halign:'center'},
      alternateRowStyles:{fillColor:[18,17,12]},
      didParseCell(d){if(d.column.index===7){d.cell.styles.textColor=d.cell.raw==='Conteggiata'?[46,204,113]:[231,76,60];d.cell.styles.fontStyle='bold';}},
      willDrawPage(data){doc.setFillColor(6,6,8);doc.rect(0,0,W,H,'F');doc.setDrawColor(201,162,39);doc.setLineWidth(0.6);doc.line(10,H-12,W-10,H-12);doc.setFontSize(7.5);doc.setTextColor(130,120,80);doc.text('AD Security — Documento riservato',14,H-7);doc.text(`Pagina ${data.pageNumber}`,W-14,H-7,{align:'right'});}
    });
    startY=doc.lastAutoTable.finalY+10;
    if(startY>H-30){doc.addPage();doc.setFillColor(6,6,8);doc.rect(0,0,W,H,'F');startY=14;}
  });
  return new Blob([doc.output('arraybuffer')], {type:'application/pdf'});
}

async function generateXLSXBlob() {
  const rows = await getAllExpensesFlat();
  const wb   = XLSX.utils.book_new();
  const headers = ['Cognome','Nome','Email','Data','Luogo Servizio','Solo','Note','Stato Pagamento'];
  const ws1 = XLSX.utils.aoa_to_sheet([headers, ...rows.map(r=>[r.cognome,r.nome,r.email,r.data,r.luogo,r.solo,r.note,r.pagato])]);
  ws1['!cols']=[{wch:16},{wch:14},{wch:30},{wch:14},{wch:40},{wch:8},{wch:40},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Spese Auto');
  const raw = XLSX.write(wb, {type:'array', bookType:'xlsx'});
  return new Blob([raw], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
}

async function renderUserRules(content) {
  try {
    const [rules, rulesLog] = await Promise.all([
      apiFetch('/rules'),
      apiFetch('/rules-log')
    ]);
    const getUserRuleDecision = (ruleId) => {
      const log = rulesLog.filter(l => l.user_id === currentUser.id && l.rule_id === ruleId);
      if (!log.length) return null;
      return log[log.length - 1];
    };
    const pending = rules.filter(r => !getUserRuleDecision(r.id)).length;
    content.innerHTML = `
      <div style="text-align:center;padding:20px 16px 8px"><img src="/logo-operator.png" alt="Alfa Security Operator" style="max-width:260px;width:65%;height:auto"></div>
      <div class="card">

        ${pending > 0 ? `
          <div class="rules-alert">
            ⚠️ Hai <strong>${pending} regole</strong> che richiedono la tua attenzione.<br>
            Per completare l'attivazione leggi e rispondi a ciascun punto.
          </div>` : `
          <div style="background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);border-radius:var(--radius);
            padding:14px 18px;margin-bottom:20px;color:#2ecc71;font-size:13px;font-weight:600">

          </div>`}

          ? '<div class="empty-state"><div class="empty-icon">📜</div>Nessuna regola pubblicata al momento.</div>'
          : rules.map((r, i) => {
            const dec = getUserRuleDecision(r.id);
            const status = dec ? dec.decision : 'pending';
            const statusLabel = {accepted:'✅ Accettato', rejected:'❌ Non Accettato', viewed:'👁 Visionato', pending:'⏳ In attesa'}[status];
            const badgeClass = {accepted:'accepted', rejected:'rejected', viewed:'viewed', pending:'pending'}[status];
            return `
            <div class="rule-row">
              <div class="rule-title-badge">📋 Regola ${i+1}${r.title ? ' — ' + r.title : ''}</div>
              <div class="rule-row-text">${r.text}</div>

                <button class="btn-accept no ${dec?.decision==='rejected'?'active':''}"
                  onclick="recordRuleDecision('${r.id}','rejected')">❌ Non Accetto</button>

                  <span style="font-size:10px;font-weight:400">${new Date(dec.timestamp||dec.created_at).toLocaleString('it-IT')}</span>
                </span>` : ''}
              </div>
            </div>`;
          }).join('')}
      </div>
    `;

              <div class="field-label">📄 Allega PDF (opzionale)</div>
              <input type="file" id="new-rule-pdf" accept=".pdf"
                style="color:var(--text-muted);font-size:13px">
              <div style="font-size:11px;color:var(--text-muted);margin-top:4px">
                Il PDF verrà visualizzato dall'operatore nella sezione Accettazione Regole
              </div>
            </div>
          </div>
          <button class="btn-sm btn-primary" onclick="addAdminRule()">📜 Pubblica Regola</button>
        </div>

        <!-- RULES LIST -->
        <div class="card-title" style="margin-bottom:14px;font-size:11px">
          📋 Regole Attive (${rules.length})
        </div>
        ${rules.length === 0
          ? '<div class="empty-state"><div class="empty-icon">📜</div>Nessuna regola pubblicata</div>'
          : rules.map((r, i) => {
            const acceptedCount = rulesLog.filter(l => l.rule_id === r.id && l.decision === 'accepted').length;
            const rejectedCount = rulesLog.filter(l => l.rule_id === r.id && l.decision === 'rejected').length;
            const viewedCount   = rulesLog.filter(l => l.rule_id === r.id && l.decision === 'viewed').length;
            return `
            <div class="info-admin-row" style="flex-direction:column;gap:10px">
              <div style="display:flex;align-items:flex-start;gap:12px;width:100%">
                <div class="info-admin-num">${i+1}</div>
                <div style="flex:1">
                  ${r.title ? `<div class="rule-title-badge" style="margin-bottom:6px">📋 ${r.title}</div>` : ''}
                  <div class="info-admin-text">${r.text}</div>
                  ${r.pdf_data ? `<div style="margin-top:6px"><a class="rule-pdf-badge" href="${r.pdf_data}" target="_blank">📄 ${r.pdf_name||'PDF allegato'}</a></div>` : '<div style="font-size:11px;color:var(--text-muted);margin-top:4px">📎 Nessun PDF allegato</div>'}
                </div>
                <div class="info-admin-actions" style="display:flex;flex-direction:column;gap:4px">
                  <div style="display:flex;gap:4px">
                    <button class="btn-sm btn-secondary" style="padding:3px 7px;font-size:13px" onclick="moveAdminRule('${r.id}','up')" ${i===0?'disabled':''}>⬆️</button>

              </div>
            </div>`;
          }).join('')}
      </div>

      <!-- RIEPILOGO NON ACCETTATE -->
      ${(() => {
        const rejected = rulesLog.filter(l => l.decision === 'rejected');
        if (rejected.length === 0) return `
          <div class="card" style="margin-bottom:20px;border-color:rgba(39,174,96,0.35)">

              ${grps.map(({nome, items}) => `
                <div style="border:1px solid rgba(231,76,60,0.25);border-radius:10px;overflow:hidden">
                  <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;background:rgba(231,76,60,0.07);border-bottom:1px solid rgba(231,76,60,0.2)">

                    <div style="font-weight:700;font-size:13px">${nome}</div>
                    <div style="margin-left:auto;font-size:11px;color:#e74c3c;font-weight:600">${items.length} regola${items.length>1?'e':''} non accettata${items.length>1?'e':''}</div>

                  <div style="padding:10px 14px;display:flex;flex-direction:column;gap:6px">
                    ${items.map(l => {
                      const rule = rules.find(r => r.id === l.rule_id);
                      const ruleTitle = rule?.title || l.rule_text?.substring(0,50) || '—';
                      const ts = l.timestamp || l.created_at;
                      const data = new Date(ts).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
                      return `<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--bg3);border-radius:7px;border-left:3px solid #e74c3c">
                        <span style="font-size:14px">📋</span>
                        <span style="font-weight:600;font-size:12px;flex:1">${ruleTitle}</span>
                        <span style="font-size:10px;color:var(--text-muted);white-space:nowrap">${data}</span>
                      </div>`;
                    }).join('')}
                  </div>
                </div>`).join('')}
            </div>
          </div>`;
      })()}

      <!-- LOG -->
      <div class="card">
        <div class="card-title">📋 Log Accettazioni (${sortedLog.length} voci)</div>
        ${sortedLog.length === 0
          ? '<div class="empty-state"><div class="empty-icon">📋</div>Nessuna risposta registrata</div>'
          : (() => {
              // Raggruppa per nominativo mantenendo ordine cronologico del primo log
              const grps = []; const seen = {};
              sortedLog.forEach(l => {
                const nome = l.user_name || l.userName || '—';
                if (!seen[nome]) { seen[nome] = []; grps.push({nome, email: l.user_email||l.userEmail||'', items: seen[nome]}); }
                seen[nome].push(l);
              });
              const decLabel = d => ({accepted:'✅ Accettato', rejected:'❌ Non Accettato', viewed:'👁 Visionato'}[d] || d);
              const decColor = d => ({accepted:'#2ecc71', rejected:'#e74c3c', viewed:'var(--gold)'}[d] || 'var(--text)');
              const decBg    = d => ({accepted:'rgba(46,204,113,0.08)', rejected:'rgba(231,76,60,0.08)', viewed:'rgba(201,162,39,0.08)'}[d] || '');
              return grps.map(({nome, email, items}) => {
                const nAcc = items.filter(l=>l.decision==='accepted').length;
                const nRej = items.filter(l=>l.decision==='rejected').length;
                const nView = items.filter(l=>l.decision==='viewed').length;
                return `
                <div style="margin-bottom:18px;border:1px solid var(--border);border-radius:12px;overflow:hidden">
                  <div style="display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--bg3);border-bottom:1px solid var(--border)">
                    <div style="width:34px;height:34px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#000;flex-shrink:0">${nome.split(' ').map(p=>p[0]||'').join('').substring(0,2).toUpperCase()}</div>
                    <div style="flex:1">
                      <div style="font-weight:700;font-size:13px">${nome}</div>
                      <div style="font-size:11px;color:var(--text-muted)">${email}</div>
                    </div>
                    <div style="display:flex;gap:6px;flex-wrap:wrap">
                      <span style="font-size:11px;background:rgba(39,174,96,0.1);color:#2ecc71;padding:2px 9px;border-radius:10px;border:1px solid rgba(39,174,96,0.3)">✅ ${nAcc}</span>
                      <span style="font-size:11px;background:rgba(231,76,60,0.1);color:#e74c3c;padding:2px 9px;border-radius:10px;border:1px solid rgba(231,76,60,0.3)">❌ ${nRej}</span>
                      <span style="font-size:11px;background:rgba(201,162,39,0.1);color:var(--gold);padding:2px 9px;border-radius:10px;border:1px solid var(--border-gold)">👁 ${nView}</span>
                    </div>
                  </div>
                  <div class="table-wrap" style="margin:0">
                    <table class="admin-exp-table" style="margin:0">
                      <thead><tr>
                        <th style="width:140px">Data e Ora</th>
                        <th>Regola</th>
                        <th style="width:140px">Risposta</th>
                      </tr></thead>
                      <tbody>
                        ${items.map(l => {
                          const ts = l.timestamp || l.created_at;
                          const rule = rules.find(r => r.id === l.rule_id);
                          const ruleTitle = rule?.title || l.rule_text?.substring(0,50) || '—';
                          const rulePreview = rule?.text || l.rule_text || '';
                          return `<tr style="background:${decBg(l.decision)}">
                            <td style="white-space:nowrap;font-size:10px;color:var(--gold);font-family:'Cinzel',serif">
                              ${new Date(ts).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
                            </td>
                            <td>
                              <div style="font-weight:600;font-size:12px;margin-bottom:2px">📋 ${ruleTitle}</div>
                              ${rulePreview?`<div style="font-size:10px;color:var(--text-muted)">${rulePreview.substring(0,80)}${rulePreview.length>80?'…':''}</div>`:''}
                            </td>
                            <td style="font-weight:700;color:${decColor(l.decision)};white-space:nowrap">${decLabel(l.decision)}</td>
                          </tr>`;
                        }).join('')}
                      </tbody>
                    </table>
                  </div>
                </div>`;
              }).join('');
            })()}
      </div>
    `;
  } catch(e) { content.innerHTML = '<div class="empty-state">Errore caricamento regole</div>'; }
}

async function addAdminRule() {
  const title = document.getElementById('new-rule-title')?.value.trim();
  const text  = document.getElementById('new-rule-text')?.value.trim();
  const pdfEl = document.getElementById('new-rule-pdf');
  if (!title) { showToast('Inserisci il titolo della regola', 'error'); return; }
  if (!text)  { showToast('Scrivi il testo della regola', 'error'); return; }
  let pdfData = null, pdfName = null;
  if (pdfEl?.files[0]) {
    const f = pdfEl.files[0];
    if (f.size > 5242880) { showToast('PDF troppo grande (max 5MB)', 'error'); return; }
    pdfData = await fileToBase64(f);
    pdfName = f.name;
  }
  try {
    await apiFetch('/rules', { method: 'POST', body: JSON.stringify({ title, text, pdf_data: pdfData, pdf_name: pdfName }) });
    await renderAdminRules(document.getElementById('content'));
    showToast('Regola pubblicata ✓');
  } catch(e) { showToast('Errore pubblicazione regola', 'error'); }
}

async function saveAdminRule(id) {
  const title = document.getElementById('edit-rule-title')?.value.trim();
  const text  = document.getElementById('edit-rule-text')?.value.trim();
  const pdfEl = document.getElementById('edit-rule-pdf');
  const remove = document.getElementById('remove-rule-pdf')?.checked;
  if (!title) { showToast('Inserisci il titolo', 'error'); return; }
  if (!text)  { showToast('Il testo non può essere vuoto', 'error'); return; }
  let pdfData = undefined, pdfName = undefined;
  if (remove) { pdfData = null; pdfName = null; }
  else if (pdfEl?.files[0]) {
    const f = pdfEl.files[0];
    if (f.size > 5242880) { showToast('PDF troppo grande (max 5MB)', 'error'); return; }
    pdfData = await fileToBase64(f);
    pdfName = f.name;
  }
  try {
    await apiFetch(`/rules/${id}`, { method: 'PUT', body: JSON.stringify({ title, text, pdf_data: pdfData, pdf_name: pdfName }) });
    closeModalDirect();
    await renderAdminRules(document.getElementById('content'));
    showToast('Regola aggiornata ✓');
  } catch(e) { showToast('Errore aggiornamento regola', 'error'); }
}

// ══ TESSERE ASC ══════════════════════════════════════════════════════════════
async function renderAdminTessere(content, searchQ) {
  try {
    const [tessere, users] = await Promise.all([
      apiFetch('/tessere'),
      apiFetch('/users')
    ]);
    const q = (searchQ||'').toLowerCase();
    const usersMap = {};
    users.forEach(u => { usersMap[u.id] = u; });
    const filtered = tessere.filter(t => {
      const u = usersMap[t.user_id] || {};
      return !q || `${u.nome||''} ${u.cognome||''} ${u.email||''}`.toLowerCase().includes(q);
    });
    content.innerHTML = `
      <div class="card">
        <div class="card-title">🪪 Tessere ASC Operatori</div>
        <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
          <div style="flex:1;min-width:220px;position:relative">
            <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:13px;pointer-events:none">🔍</span>
            <input class="field-input" style="padding-left:32px;width:100%;box-sizing:border-box"
              placeholder="Cerca per nome, cognome o email..."
              value="${searchQ||''}"
              oninput="renderAdminTessere(document.getElementById('content'), this.value)">
          </div>
          <button class="btn-primary" style="background:linear-gradient(135deg,#7a5c00,#c9a227);border-color:rgba(201,162,39,0.5);color:#fff700;font-weight:700" onclick="tesseraNewModal()">+ Nuova Tessera</button>
        </div>
        ${filtered.length === 0
          ? '<div style="color:var(--text-muted);font-size:13px;padding:20px 0;text-align:center">Nessuna tessera trovata</div>'
          : `<div style="overflow-x:auto"><table class="gu-table">
            <thead><tr><th>Operatore</th><th>Matricola</th><th>Creata il</th><th>Azioni</th></tr></thead>
            <tbody>
              ${filtered.map(t => {
                const u = usersMap[t.user_id] || {};

async function tesseraStampa(userId) {
  try {
    const [user, docs] = await Promise.all([
      apiFetch(`/users/${userId}`),
      apiFetch(`/documents/${userId}`)
    ]);
    const fotoDoc = docs.foto_selfie || null;
    const { jsPDF } = window.jspdf;
    const W = 101.3, H = 71.5;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [W, H] });
    const fmt = v => v ? v.substring(0,10).split('-').reverse().join('/') : '—';

    const drawBorder = () => {
      doc.setDrawColor(201, 162, 39); doc.setLineWidth(0.8);
      doc.rect(0.4, 0.4, W-0.8, H-0.8);
      doc.setDrawColor(120, 80, 0); doc.setLineWidth(0.3);
      doc.rect(2, 2, W-4, H-4);
    };

    // ── FRONTE ──
    doc.setFillColor(255, 215, 0);
    doc.rect(0, 0, W, H, 'F');
    doc.setFillColor(0, 0, 0);
    doc.rect(0, 0, W, 14, 'F');
    doc.setDrawColor(201,162,39); doc.setLineWidth(0.5);
    doc.line(0, 14, W, 14);
    doc.setTextColor(255, 215, 0);
    doc.setFont('helvetica','bold');
    doc.setFontSize(14);
    doc.text('ALFA SECURITY', W/2, 9.5, { align:'center' });

    if(fotoDoc && fotoDoc.data) {
      try {
        const fmt_img = fotoDoc.mime_type.includes('png') ? 'PNG' : 'JPEG';
        doc.addImage(fotoDoc.data, fmt_img, 4, 17, 26, 42);
      } catch(e) {
        doc.setFillColor(180,180,180); doc.rect(4, 17, 26, 42, 'F');
        doc.setTextColor(100,100,100); doc.setFontSize(6); doc.setFont('helvetica','normal');
        doc.text('No foto', 17, 40, {align:'center'});
      }
    } else {
      doc.setFillColor(180,180,180); doc.rect(4, 17, 26, 42, 'F');
      doc.setTextColor(100,100,100); doc.setFontSize(6); doc.setFont('helvetica','normal');
      doc.text('No foto', 17, 40, {align:'center'});
    }

    doc.setTextColor(180, 0, 0);
    doc.setFont('helvetica','bold');
    doc.setFontSize(22);
    doc.text('ASSISTENZA', 62, 48, { align:'center' });

    doc.setTextColor(100, 70, 0);
    doc.setFont('helvetica','bold');
    doc.setFontSize(6);
    doc.text('TESSERA DI RICONOSCIMENTO ASC', W/2, 67, { align:'center' });
    drawBorder();

    // ── RETRO ──
    doc.addPage();
    doc.setFillColor(255, 215, 0);
    doc.rect(0, 0, W, H, 'F');
    doc.setFillColor(0, 0, 0);
    doc.rect(0, 0, W, 14, 'F');
    doc.setDrawColor(201,162,39); doc.setLineWidth(0.5);
    doc.line(0, 14, W, 14);
    doc.setTextColor(255, 215, 0);
    doc.setFont('helvetica','bold');
    doc.setFontSize(14);
    doc.text('ALFA SECURITY', W/2, 9.5, { align:'center' });

    let y = 21;
    doc.setTextColor(0,0,0); doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.text(`${user.nome||'—'} ${user.cognome||''}`, 6, y); y+=7;
    doc.setFontSize(9);
    doc.text(`Data di nascita: ${fmt(user.data_nascita)}`, 6, y); y+=6;
    doc.setFontSize(10);
    doc.text(`Nr. Matricola: ${user.nr_matricola||'—'}`, 6, y); y+=6;
    doc.setFontSize(9);
    doc.text(`Rilasciata: ${fmt(user.matricola_rilasciata)}`, 6, y); y+=6;
    doc.text(`Scadenza: ${fmt(user.matricola_scadenza)}`, 6, y);

    doc.setFillColor(0,0,0);
    doc.rect(0, H-9, W, 9, 'F');
    doc.setDrawColor(201,162,39); doc.setLineWidth(0.5);
    doc.line(0, H-9, W, H-9);
    doc.setTextColor(180,180,180); doc.setFont('helvetica','normal'); doc.setFontSize(5.5);
    doc.text('Alfa Security • Via Roma 35 • Tel 0461-421049 • Amm. Unico: Loss Tiziano', W/2, H-3.5, { align:'center' });
    drawBorder();

    const nome = `${user.nome||'operatore'}_${user.cognome||''}`.replace(/\s/g,'_');
    doc.save(`tessera_ASC_${nome}.pdf`);
    showToast('PDF scaricato ✓');
  } catch(e) { showToast('Errore generazione PDF', 'error'); console.error(e); }
}

function ammDetRender(tipo) {

  const totEl = document.getElementById('amm-det-tot');
  if (!el) return;
  const tot = lista.reduce((s,v)=>s+(parseFloat(v.importo)||0),0);
  if (totEl) totEl.textContent = '€ '+tot.toFixed(2).replace('.',',');
  el.innerHTML = lista.length === 0
    ? '<div style="color:var(--text-muted);font-size:13px;margin-bottom:12px;text-align:center;padding:16px;background:var(--bg3);border-radius:8px">Nessuna voce aggiunta.</div>'
    : lista.map((v,i)=>`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;background:var(--bg3);padding:10px 14px;border-radius:10px;border:1px solid var(--border)">
        <span style="flex:1;font-size:13px">${v.descrizione}</span>
        <span style="font-weight:700;color:var(--gold);font-size:14px">€ ${parseFloat(v.importo).toFixed(2).replace('.',',')}</span>
        <button class="btn-sm btn-danger" onclick="ammDetRimuovi('${tipo}',${i})">✕</button>
      </div>`).join('');
}

function ammDetAggiungi(tipo) {
  const desc = document.getElementById('amm-det-desc')?.value.trim();
  const imp = parseFloat(document.getElementById('amm-det-imp')?.value);
  if (!desc || !imp) { showToast('Inserisci descrizione e importo','error'); return; }
  if (tipo === 'societa') _ammDettagliSocieta.push({descrizione:desc, importo:imp});
  else _ammDettagliCostiVari.push({descrizione:desc, importo:imp});
  document.getElementById('amm-det-desc').value='';
  document.getElementById('amm-det-imp').value='';
  ammDetRender(tipo);
}

function ammDetRimuovi(tipo, idx) {
  if (tipo === 'societa') _ammDettagliSocieta.splice(idx,1);
  else _ammDettagliCostiVari.splice(idx,1);
  ammDetRender(tipo);
}

function ammMostraDettagliSottoCampo(tipo) {
  const lista = tipo === 'societa' ? _ammDettagliSocieta : _ammDettagliCostiVari;
  const el = document.getElementById(tipo === 'societa' ? 'amm-soc-items' : 'amm-cv-items');
  if (!el) return;
  el.innerHTML = lista.length === 0 ? '' : lista.map(v =>
    `<div style="display:flex;justify-content:space-between;padding:3px 8px;font-size:11px;color:var(--text-muted);border-left:2px solid rgba(201,162,39,0.3);margin-top:3px">
      <span>${v.descrizione}</span>
      <span style="color:var(--gold);font-family:monospace;flex-shrink:0;margin-left:8px">€ ${parseFloat(v.importo).toFixed(2).replace('.',',')}</span>
    </div>`
  ).join('');
}

async function ammDetConferma(tipo) {
  const lista = tipo === 'societa' ? _ammDettagliSocieta : _ammDettagliCostiVari;
  const tot = lista.reduce((s,v)=>s+(parseFloat(v.importo)||0),0);
  const inputId = tipo === 'societa' ? 'amm-societa' : 'amm-costi-vari';
  const el = document.getElementById(inputId);
  if (el) el.value = tot.toFixed(2);
  document.getElementById('amm-modal-dettaglio')?.remove();
  ammMostraDettagliSottoCampo(tipo);
  ammCalcola();
  await ammSalva();
}

function ammGetInputs() {
  const g = id => parseFloat(document.getElementById(id)?.value) || 0;
  return {
    fatture: g('amm-fatture'), nn: g('amm-nn'),
    numero_servizi_mese: parseInt(document.getElementById('amm-servizi')?.value)||0,
    costo_paghe_op: g('amm-paghe-op'), costo_paghe_op_b: g('amm-paghe-op-b'),
    costo_tax: g('amm-tax'), costo_amm_paghe: g('amm-amm-paghe'),
    costo_manager_security: g('amm-manager'), costo_vestiario: g('amm-vestiario'),
    costo_societa_varie: g('amm-societa'), costi_vari: g('amm-costi-vari'),
    societa_varie_dettaglio: JSON.stringify(_ammDettagliSocieta),
    costi_vari_dettaglio: JSON.stringify(_ammDettagliCostiVari)
  };
}

function ammCalc(d) {
  const fatTot = (parseFloat(d.fatture)||0) + (parseFloat(d.nn)||0);
  const totCosti = (parseFloat(d.costo_paghe_op)||0)+(parseFloat(d.costo_paghe_op_b)||0)+(parseFloat(d.costo_tax)||0)+(parseFloat(d.costo_amm_paghe)||0)+(parseFloat(d.costo_manager_security)||0)+(parseFloat(d.costo_vestiario)||0)+(parseFloat(d.costo_societa_varie)||0)+(parseFloat(d.costi_vari)||0);
  const ns = parseInt(d.numero_servizi_mese)||0;
  const risultato = fatTot - totCosti;
  const valMedio = ns > 0 ? (fatTot/ns).toFixed(2) : 'N/D';
  const costoPerServizio = ns > 0 ? (((parseFloat(d.costo_paghe_op)||0)+(parseFloat(d.costo_paghe_op_b)||0))/ns).toFixed(2) : 'N/D';
  const margine = fatTot > 0 ? ((risultato/fatTot)*100).toFixed(1)+'%' : 'N/D';
  return { fatTot, totCosti, risultato, valMedio, costoPerServizio, margine };
}

function ammCalcola() {
  const d = ammGetInputs();
  const c = ammCalc(d);
  const el = document.getElementById('amm-calcolati');
  if (!el) return;
  const fmt = v => '€ '+v.toFixed(2).replace('.',',');
  el.innerHTML = `
    <div class="amm-kpi"><div class="amm-kpi-label">💶 Fatturato Totale</div><div class="amm-kpi-val" style="color:#c9a227">${fmt(c.fatTot)}</div></div>
    <div class="amm-kpi"><div class="amm-kpi-label">📤 Totale Costi</div><div class="amm-kpi-val" style="color:#e74c3c">${fmt(c.totCosti)}</div></div>
    <div class="amm-kpi"><div class="amm-kpi-label">📊 Risultato Netto</div><div class="amm-kpi-val" style="color:${c.risultato>=0?'#2ecc71':'#e74c3c'}">${fmt(c.risultato)}</div></div>
    <div class="amm-kpi"><div class="amm-kpi-label">📈 Margine %</div><div class="amm-kpi-val" style="color:${c.risultato>=0?'#2ecc71':'#e74c3c'}">${c.margine}</div></div>
    <div class="amm-kpi"><div class="amm-kpi-label">💰 Val. medio/servizio</div><div class="amm-kpi-val">${c.valMedio==='N/D'?'N/D':'€ '+c.valMedio}</div></div>
    <div class="amm-kpi"><div class="amm-kpi-label">👷 Costo paghe/servizio</div><div class="amm-kpi-val">${c.costoPerServizio==='N/D'?'N/D':'€ '+c.costoPerServizio}</div></div>
  `;
}

async function ammLoad() {
  const mese = parseInt(document.getElementById('amm-mese')?.value);
  const anno = parseInt(document.getElementById('amm-anno')?.value);
  if (!mese || !anno) return;
  const badge = document.getElementById('amm-stato-badge');
  const hint = document.getElementById('amm-nav-hint');
  try {
    const d = await apiFetch(`/admin/amministrazione?mese=${mese}&anno=${anno}`);
    _ammMeseHasDati = !!(d && (d.fatture || d.nn || d.costo_paghe_op));
    if (badge) {
      badge.className = 'amm-mese-badge ' + (_ammMeseHasDati ? 'saved' : 'nuovo');
      badge.textContent = _ammMeseHasDati ? '✎ Modifica mese' : '● Nuovo mese';
    }
    if (hint) hint.textContent = _ammMeseHasDati ? `Dati salvati per ${MESI_NOMI[mese]} ${anno}` : `Nessun dato per ${MESI_NOMI[mese]} ${anno}`;
    const fields = {
      'amm-fatture':'fatture','amm-nn':'nn','amm-servizi':'numero_servizi_mese',
      'amm-paghe-op':'costo_paghe_op','amm-paghe-op-b':'costo_paghe_op_b',
      'amm-tax':'costo_tax','amm-amm-paghe':'costo_amm_paghe',
      'amm-manager':'costo_manager_security','amm-vestiario':'costo_vestiario',
      'amm-societa':'costo_societa_varie','amm-costi-vari':'costi_vari'
    };
    Object.entries(fields).forEach(([elId, key]) => {
      const el = document.getElementById(elId);
      if (el) el.value = d && (parseFloat(d[key])||0) ? (parseFloat(d[key])||0) : '';
    });
    _ammDettagliSocieta = d?.societa_varie_dettaglio ? JSON.parse(d.societa_varie_dettaglio) : [];
    _ammDettagliCostiVari = d?.costi_vari_dettaglio ? JSON.parse(d.costi_vari_dettaglio) : [];
    ammMostraDettagliSottoCampo('societa');
    ammMostraDettagliSottoCampo('costi-vari');
    ammCalcola();
    await ammLoadAnnuale(anno);
  } catch(e) { showToast('Errore caricamento dati','error'); }
}

function ammChangeMese(delta) {
  const m = document.getElementById('amm-mese');
  const a = document.getElementById('amm-anno');
  if (!m || !a) return;
  let mese = parseInt(m.value) + delta;
  let anno = parseInt(a.value);
  if (mese < 1) { mese = 12; anno--; }
  if (mese > 12) { mese = 1; anno++; }
  m.value = mese;
  const opts = a.querySelectorAll('option');
  let found = false;
  opts.forEach(o => { if (parseInt(o.value)===anno) { o.selected=true; found=true; }});
  if (!found) { const o = document.createElement('option'); o.value=anno; o.textContent=anno; a.appendChild(o); o.selected=true; }
  ammLoad();
}

async function ammSalva() {
  const mese = parseInt(document.getElementById('amm-mese')?.value);
  const anno = parseInt(document.getElementById('amm-anno')?.value);
  const data = { mese, anno, ...ammGetInputs() };
  try {
    await apiFetch('/admin/amministrazione', {method:'POST', body:JSON.stringify(data)});
    showToast('✓ Dati salvati per '+MESI_NOMI[mese]+' '+anno);
    _ammMeseHasDati = true;
    const badge = document.getElementById('amm-stato-badge');
    const hint = document.getElementById('amm-nav-hint');
    if (badge) { badge.className='amm-mese-badge saved'; badge.textContent='✎ Modifica mese'; }
    if (hint) hint.textContent = `Dati salvati per ${MESI_NOMI[mese]} ${anno}`;
    await ammLoadAnnuale(anno);
  } catch(e) { showToast('Errore salvataggio','error'); }
}

async function ammLoadAnnuale(anno) {
  const lbl = document.getElementById('amm-anno-label');
  if (lbl) lbl.textContent = anno;
  try {
    const rows = await apiFetch(`/admin/amministrazione/anno/${anno}`);
    ammRenderRiepilogo(rows, anno);
    ammRenderCharts(rows, anno);
  } catch(e) {}
}

function ammRenderCharts(rows, anno) {
  if (_ammChart1) { _ammChart1.destroy(); _ammChart1=null; }
  if (_ammChart2) { _ammChart2.destroy(); _ammChart2=null; }
  if (_ammChart3) { _ammChart3.destroy(); _ammChart3=null; }
  const c1 = document.getElementById('amm-chart1');
  const c2 = document.getElementById('amm-chart2');
  const c3 = document.getElementById('amm-chart3');
  if (!rows.length) return;
  const mese = parseInt(document.getElementById('amm-mese')?.value);
  const row = rows.find(r=>r.mese===mese) || rows[0];
  // Chart 1: Pie - composizione costi
  if (c1) {
    const allCostiLabels = ['Paghe Op','Premio Op','Tasse','Amm.Paghe','Manager','Vestiario','Soc.Varie','Costi Vari'];
    const allCostiValues = [parseFloat(row.costo_paghe_op)||0,parseFloat(row.costo_paghe_op_b)||0,parseFloat(row.costo_tax)||0,parseFloat(row.costo_amm_paghe)||0,parseFloat(row.costo_manager_security)||0,parseFloat(row.costo_vestiario)||0,parseFloat(row.costo_societa_varie)||0,parseFloat(row.costi_vari)||0];
    const costiLabels2 = allCostiLabels.filter((_,i)=>allCostiValues[i]>0);
    const costiValues2 = allCostiValues.filter(v=>v>0);
    const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63'];
    _ammChart1 = new Chart(c1, {
      type: 'pie',
      data: { labels: costiLabels2, datasets: [{ data: costiValues2, backgroundColor: colors, borderWidth:2, borderColor:'rgba(0,0,0,0.3)' }] },
      options: { responsive:true, maintainAspectRatio:false, plugins: { title:{ display:true, text:`Distribuzione Costi — ${MESI_NOMI[row.mese]} ${anno}`, color:'#c9a227', font:{size:13} }, legend:{ labels:{ color:'#aaa', padding:16 } } } }
    });
  }
  // Chart 2: Line - andamento annuale
  if (c2) {
    const allMesi = Array.from({length:12},(_,i)=>i+1);
    const fatData = allMesi.map(m=>{ const r=rows.find(x=>x.mese===m); return r?(parseFloat(r.fatture)||0)+(parseFloat(r.nn)||0):null; });
    const costiData = allMesi.map(m=>{ const r=rows.find(x=>x.mese===m); return r?ammCalc(r).totCosti:null; });
    const risData = allMesi.map(m=>{ const r=rows.find(x=>x.mese===m); return r?ammCalc(r).risultato:null; });
    _ammChart2 = new Chart(c2, {
      type: 'line',
      data: {
        labels: MESI_NOMI.slice(1),
        datasets: [
          { label:'Fatturato', data:fatData, borderColor:'#c9a227', backgroundColor:'rgba(201,162,39,0.1)', tension:0.3, spanGaps:true, pointRadius:5, pointHoverRadius:8 },
          { label:'Costi', data:costiData, borderColor:'#e74c3c', backgroundColor:'rgba(231,76,60,0.1)', tension:0.3, spanGaps:true, pointRadius:5, pointHoverRadius:8 },
          { label:'Risultato', data:risData, borderColor:'#2ecc71', backgroundColor:'rgba(46,204,113,0.1)', tension:0.3, spanGaps:true, pointRadius:5, pointHoverRadius:8 }
        ]
      },
      options: { responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false}, plugins:{ title:{display:true,text:`Andamento ${anno}`,color:'#c9a227',font:{size:13}}, legend:{labels:{color:'#aaa'}} }, scales:{ x:{ticks:{color:'#aaa'},grid:{color:'rgba(255,255,255,0.05)'}}, y:{ticks:{color:'#aaa', callback:v=>'€'+v.toFixed(0)},grid:{color:'rgba(255,255,255,0.05)'}} } }
    });
  }
  // Chart 3: Bar - Fatturato vs Costi per mese
  if (c3) {
    const allMesi = Array.from({length:12},(_,i)=>i+1);
    const fatBar = allMesi.map(m=>{ const r=rows.find(x=>x.mese===m); return r?(parseFloat(r.fatture)||0)+(parseFloat(r.nn)||0):0; });
    const costiBar = allMesi.map(m=>{ const r=rows.find(x=>x.mese===m); return r?ammCalc(r).totCosti:0; });
    _ammChart3 = new Chart(c3, {
      type: 'bar',
      data: {
        labels: MESI_NOMI.slice(1),
        datasets: [
          { label:'Fatturato', data:fatBar, backgroundColor:'rgba(201,162,39,0.7)', borderColor:'rgba(201,162,39,1)', borderWidth:1, borderRadius:6 },
          { label:'Costi', data:costiBar, backgroundColor:'rgba(231,76,60,0.7)', borderColor:'rgba(231,76,60,1)', borderWidth:1, borderRadius:6 }
        ]
      },
      options: { responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false}, plugins:{ title:{display:true,text:`Fatturato vs Costi per Mese — ${anno}`,color:'#c9a227',font:{size:13}}, legend:{labels:{color:'#aaa'}} }, scales:{ x:{ticks:{color:'#aaa'},grid:{color:'rgba(255,255,255,0.05)'}}, y:{ticks:{color:'#aaa', callback:v=>'€'+v.toFixed(0)},grid:{color:'rgba(255,255,255,0.05)'}, beginAtZero:true} } }
    });
  }
}

async function ammCancellaAll() {
  if (!confirm('⚠️ ATTENZIONE: Cancellare TUTTO lo storico contabilità?\n\nQuesta operazione è IRREVERSIBILE.')) return;
  if (!confirm('Sei assolutamente sicuro? Verranno eliminati TUTTI i dati di TUTTI gli anni.')) return;
  try {
    await apiFetch('/admin/amministrazione/all', {method:'DELETE'});
    showToast('Storico cancellato');
    renderAdminAmministrazione(document.getElementById('content'));
  } catch(e) { showToast('Errore cancellazione','error'); }
}

async function ammEsportaPDF() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const W = 210, m = 16;
  // ── HEADER ──
  doc.setFillColor(201,162,39);
  doc.rect(0,0,210,28,'F');
  doc.setFontSize(18); doc.setTextColor(0,0,0); doc.setFont(undefined,'bold');
  doc.text('AD SECURITY', m, 12);
  doc.setFontSize(11); doc.setFont(undefined,'normal');
  doc.text('Gestione Operatori — Contabilità Mensile', m, 20);
  doc.setFontSize(11); doc.setTextColor(0,0,0);
  doc.text(`${MESI_NOMI[mese]} ${anno}`, W-m, 12, {align:'right'});
  doc.text(`Generato il ${new Date().toLocaleString('it-IT')}`, W-m, 20, {align:'right'});
  // ── DATI CORRENTI ──
  let y = 38;
  doc.setFontSize(12); doc.setTextColor(150,100,0); doc.setFont(undefined,'bold');
  doc.text(`DETTAGLIO MENSILE — ${MESI_NOMI[mese].toUpperCase()} ${anno}`, m, y); y+=3;
  doc.setDrawColor(201,162,39); doc.setLineWidth(0.5); doc.line(m, y, W-m, y); y+=7;
  const d = ammGetInputs();
  const c = ammCalc(d);
  const fmt = v => '€ '+v.toFixed(2).replace('.',',');
  const entrateRows = [
    ['Fatture',fmt(parseFloat(d.fatture)||0)],
    ['NN',fmt(parseFloat(d.nn)||0)],
    ['N° Servizi Mese',String(d.numero_servizi_mese)],
    ['FATTURATO TOTALE',fmt(c.fatTot)],
  ];
  const costiRows = [
    ['Paghe Operatori',fmt(parseFloat(d.costo_paghe_op)||0)],
    ['Premio Operatori',fmt(parseFloat(d.costo_paghe_op_b)||0)],
    ['Tasse',fmt(parseFloat(d.costo_tax)||0)],
    ['Amm. Paghe',fmt(parseFloat(d.costo_amm_paghe)||0)],
    ['Manager Security',fmt(parseFloat(d.costo_manager_security)||0)],
    ['Vestiario',fmt(parseFloat(d.costo_vestiario)||0)],
    ['Società Varie',fmt(parseFloat(d.costo_societa_varie)||0)],
    ..._ammDettagliSocieta.map(v=>['   └ '+v.descrizione,fmt(parseFloat(v.importo)||0)]),
    ['Costi Vari',fmt(parseFloat(d.costi_vari)||0)],
    ..._ammDettagliCostiVari.map(v=>['   └ '+v.descrizione,fmt(parseFloat(v.importo)||0)]),
    ['TOTALE COSTI',fmt(c.totCosti)],
  ];
  doc.autoTable({
    startY:y, head:[['ENTRATE','']],
    body: entrateRows,
    theme:'striped',
    headStyles:{fillColor:[30,80,30],textColor:[255,255,255],fontStyle:'bold'},
    columnStyles:{0:{cellWidth:120},1:{halign:'right',fontStyle:'bold'}},
    styles:{fontSize:11},
    margin:{left:m,right:m}
  });
  y = doc.lastAutoTable.finalY + 6;
  doc.autoTable({
    startY:y, head:[['COSTI','']],
    body: costiRows,
    theme:'striped',
    headStyles:{fillColor:[120,30,30],textColor:[255,255,255],fontStyle:'bold'},
    columnStyles:{0:{cellWidth:120},1:{halign:'right',fontStyle:'bold'}},
    styles:{fontSize:11},
    didParseCell:(data)=>{
      if(data.row.raw && (data.row.raw[0]==='TOTALE COSTI'||data.row.raw[0]==='FATTURATO TOTALE'))
        { data.cell.styles.fontStyle='bold'; data.cell.styles.fillColor=[50,50,50]; }
      if(data.row.raw && data.row.raw[0]&&data.row.raw[0].startsWith('   └'))
        { data.cell.styles.textColor=[120,120,120]; data.cell.styles.fontSize=9; }
    },
    margin:{left:m,right:m}
  });
  y = doc.lastAutoTable.finalY + 6;
  // ── RISULTATO ──
  const risCol = c.risultato >= 0 ? [30,150,50] : [180,30,30];
  doc.autoTable({
    startY:y,
    head:[['RISULTATO E KPI','']],
    body:[
      ['Risultato Netto', fmt(c.risultato)],
      ['Margine %', c.margine],
      ['Valore medio/servizio', c.valMedio==='N/D'?'N/D':'€ '+c.valMedio],
      ['Costo paghe/servizio', c.costoPerServizio==='N/D'?'N/D':'€ '+c.costoPerServizio],
    ],
    theme:'grid',
    headStyles:{fillColor:[40,40,80],textColor:[255,255,255],fontStyle:'bold'},
    columnStyles:{0:{cellWidth:120},1:{halign:'right',fontStyle:'bold'}},
    styles:{fontSize:12},
    didParseCell:(data)=>{
      if(data.row.index===0&&data.column.index===1)
        { data.cell.styles.textColor=risCol; data.cell.styles.fontSize=14; }
    },
    margin:{left:m,right:m}
  });
  // ── RIEPILOGO ANNUALE ──
  try {
    const annuali = await apiFetch(`/admin/amministrazione/anno/${anno}`);
    if (annuali.length) {
      doc.addPage();
      doc.setFillColor(201,162,39);
      doc.rect(0,0,210,18,'F');
      doc.setFontSize(14); doc.setTextColor(0,0,0); doc.setFont(undefined,'bold');
      doc.text(`RIEPILOGO ANNUALE ${anno}`, m, 12);
      const totFat = annuali.reduce((s,r)=>s+(parseFloat(r.fatture)||0)+(parseFloat(r.nn)||0),0);
      const totCos = annuali.reduce((s,r)=>s+ammCalc(r).totCosti,0);
      const totRis = totFat-totCos;
      const totServ = annuali.reduce((s,r)=>s+(parseInt(r.numero_servizi_mese)||0),0);
      const fmtN = v => '€ '+v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.');
      const annBody = annuali.map(r=>{ const ca=ammCalc(r); return [MESI_NOMI[r.mese],fmtN(ca.fatTot),fmtN(ca.totCosti),fmtN(ca.risultato),ca.margine,String(r.numero_servizi_mese)]; });
      annBody.push(['TOTALE',fmtN(totFat),fmtN(totCos),fmtN(totRis),totFat>0?((totRis/totFat)*100).toFixed(1)+'%':'N/D',String(totServ)]);
      doc.autoTable({
        startY:24,
        head:[['Mese','Fatturato','Costi','Risultato','Margine','Servizi']],
        body:annBody,
        theme:'striped',
        headStyles:{fillColor:[201,162,39],textColor:[0,0,0],fontStyle:'bold'},
        styles:{fontSize:11,halign:'right'},
        columnStyles:{0:{halign:'left'},4:{fontStyle:'bold'},5:{halign:'center'}},
        didParseCell:(data)=>{
          if(data.row.index===annBody.length-1){data.cell.styles.fontStyle='bold';data.cell.styles.fillColor=[30,30,30];}
          if(data.row.index<annBody.length-1&&data.column.index===3){
            const r=annuali[data.row.index];if(r){const v=ammCalc(r).risultato;data.cell.styles.textColor=v>=0?[30,150,50]:[180,30,30];}
          }
        },
        margin:{left:m,right:m}
      });
    }
  } catch(e) {}
  // ── GRAFICI ──
  const c1 = document.getElementById('amm-chart1');
  const c2 = document.getElementById('amm-chart2');
  const c3 = document.getElementById('amm-chart3');
  if (c1||c2||c3) {
    doc.addPage();
    doc.setFillColor(201,162,39);
    doc.rect(0,0,210,18,'F');
    doc.setFontSize(13); doc.setTextColor(0,0,0); doc.setFont(undefined,'bold');
    doc.text('GRAFICI — ANALISI VISUALE', m, 12);
    let gy=24;
    if(c1){try{const img=c1.toDataURL('image/png');doc.addImage(img,'PNG',m,gy,W-m*2,90);gy+=95;}catch(e){}}
    if(c2){try{const img=c2.toDataURL('image/png');doc.addImage(img,'PNG',m,gy,W-m*2,90);gy+=95;}catch(e){}}
    if(c3&&gy>200){doc.addPage();gy=20;}
    if(c3){try{const img=c3.toDataURL('image/png');doc.addImage(img,'PNG',m,gy,W-m*2,90);}catch(e){}}
  }
  doc.save(`AlfaSecurity_Contabilita_${MESI_NOMI[mese]}_${anno}.pdf`);
}

// CASSA ANTICIPI — DB persistent version

window._CA = null;
function _caInit() {
  if (window._CA) return;
  window._CA = {
    operatori: [], anticipi: [],
    filters:{search:'',op_id:null,mese:'tutti',anno:'tutti',cat:'tutti',stato:'tutti'},
    expandedId:null, drawerOpen:false, drawerOpId:null
  };
}
function _caFmt(ds){if(!ds)return'';return new Date(ds+'T00:00:00').toLocaleDateString('it-IT');}
function _caFmtTs(ts){if(!ts)return'';const d=new Date(ts);return d.toLocaleDateString('it-IT')+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});}
function _caFmtAmt(n){return '€'+Number(n).toFixed(2).replace('.',',');}
function _caGetState(a){if(a.importo_rimborsato>=a.importo_totale)return'Saldato';if(a.importo_rimborsato>0)return'Parziale';return'Aperto';}
function _caGetOp(id){return(window._CA.operatori.find(o=>o.id===id)||{});}
const _CA_AV=['#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#16a085','#d35400','#1abc9c'];
function _caAvBg(id){let h=0;for(let i=0;i<(id||'').length;i++){h=((h<<5)-h)+id.charCodeAt(i);h|=0;}return _CA_AV[Math.abs(h)%_CA_AV.length];}
function _caInit2(op){return((op.nome||'')[0]||'')+((op.cognome||'')[0]||'');}
const _CA_CAT={
  'Divisa Security':{icon:'👔',border:'#3b82f6'},
  'Radio Operatore':{icon:'📻',border:'#8b5cf6'},
  'Corso A.S.C.':{icon:'🎓',border:'#10b981'},
  'Anticipi Competenze Richieste':{icon:'💼',border:'#f59e0b'},
  'Varie':{icon:'📦',border:'#64748b'}
};
function _caCat(c){return _CA_CAT[c]||{icon:'📦',border:'#64748b'};}
function _caGetFiltered(){
  const f=window._CA.filters;
  return window._CA.anticipi.filter(a=>{
    const op=_caGetOp(a.operatore_id);
    const fn=(op.nome+' '+op.cognome).toLowerCase();
    if(f.search&&fn.indexOf(f.search.toLowerCase())<0)return false;
    if(f.op_id&&a.operatore_id!==f.op_id)return false;
    if(f.mese!=='tutti'&&new Date(a.data_spesa+'T00:00:00').getMonth()+1!==parseInt(f.mese))return false;
    if(f.anno!=='tutti'&&new Date(a.data_spesa+'T00:00:00').getFullYear()!==parseInt(f.anno))return false;
    if(f.cat!=='tutti'&&a.categoria!==f.cat)return false;
    if(f.stato!=='tutti'&&_caGetState(a)!==f.stato)return false;
    return true;
  });
}
function _caKpi(){
  const all=window._CA.anticipi;
  return{tot:all.reduce((s,a)=>s+a.importo_totale,0),rimb:all.reduce((s,a)=>s+a.importo_rimborsato,0),aperte:all.filter(a=>_caGetState(a)!=='Saldato').length};
}
function _caAnni(){return[...new Set(window._CA.anticipi.map(a=>new Date(a.data_spesa+'T00:00:00').getFullYear()))].sort();}
function _caRender(){const c=document.getElementById('content');if(c)renderAdminCassaAnticpi(c);}
function _caSetF(k,v){window._CA.filters[k]=v;window._CA.expandedId=null;_caRender();}
function _caSelectOp(id,nome){window._CA.filters.op_id=id;window._CA.filters.search=nome;window._CA.expandedId=null;_caRender();}
function _caClearOp(){window._CA.filters.op_id=null;window._CA.filters.search='';_caRender();}
function _caToggle(id){window._CA.expandedId=window._CA.expandedId===id?null:id;_caRender();}
function _caBadge(stato){
  if(stato==='Saldato')return`<span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3)">✓ Saldato</span>`;
  if(stato==='Parziale')return`<span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(249,115,22,0.15);color:#f97316;border:1px solid rgba(249,115,22,0.3)">◑ Parziale</span>`;
  return`<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)"><span style="width:6px;height:6px;border-radius:50%;background:#ef4444;display:inline-block;animation:ca-pulse 1.5s infinite"></span>Aperto</span>`;

function _caBell(n){
  if(!n.inviata)return`<span title="Non inviata" style="color:#64748b">🔕</span>`;
  if(!n.letta)return`<span title="Inviata — non letta" style="position:relative;display:inline-block">🔔<span style="position:absolute;top:-2px;right:-3px;width:6px;height:6px;background:#ef4444;border-radius:50%;display:block;animation:ca-pulse 1s infinite"></span></span>`;
  return`<span title="Letta il ${_caFmtTs(n.letta_il)}" style="color:#10b981">🔔</span>`;
}
function _caLogDot(a){const m={'Creazione':'#3b82f6','Modifica':'#f97316','Rimborso registrato':'#10b981',"Notifica letta dall'operatore":'#f59e0b'};return m[a]||'#64748b';}

function _caSearchInput(val){
  window._CA.filters.search=val;
  if(!val||val.length<2){window._CA.filters.op_id=null;const ac=document.getElementById('ca-ac');if(ac)ac.style.display='none';return;}
  const matches=window._CA.operatori.filter(o=>(o.nome+' '+o.cognome).toLowerCase().indexOf(val.toLowerCase())>=0);
  const ac=document.getElementById('ca-ac');
  if(!ac)return;

async function _caSaveModal(id){
  const opId=document.getElementById('ca-m-op').value;
  const cat=document.getElementById('ca-m-cat').value;
  const varie=document.getElementById('ca-m-var').value.trim();
  const data=document.getElementById('ca-m-data').value;
  const imp=parseFloat(document.getElementById('ca-m-imp').value);
  const note=document.getElementById('ca-m-note').value.trim();
  if(!opId){showToast('Seleziona operatore','error');return;}
  if(!cat){showToast('Seleziona categoria','error');return;}
  if(cat==='Varie'&&!varie){showToast('Specifica la voce per Varie','error');return;}
  if(!data){showToast('Inserisci la data','error');return;}
  if(!imp||imp<=0){showToast('Inserisci importo valido','error');return;}
  const op=_caGetOp(opId);
  try {
    if(!id){
      await apiFetch('/cassa-anticipi',{method:'POST',body:JSON.stringify({operatore_id:opId,categoria:cat,descrizione_varie:varie||null,data_spesa:data,importo_totale:imp,note_admin:note})});
      showToast('✓ Spesa salvata. Notifica inviata a '+op.nome+' '+op.cognome);
    } else {
      await apiFetch('/cassa-anticipi/'+id,{method:'PUT',body:JSON.stringify({operatore_id:opId,categoria:cat,descrizione_varie:varie||null,data_spesa:data,importo_totale:imp,note_admin:note})});
      showToast('✓ Spesa aggiornata. Notifica inviata a '+op.nome+' '+op.cognome);
    }
    closeModalDirect();_caRender();
  } catch(e){showToast(e.message,'error');}
}

async function _caRimborso(aid){
  const res_el=window._CA.anticipi.find(x=>x.id===aid);if(!res_el)return;
  const residuo=res_el.importo_totale-res_el.importo_rimborsato;
  const data=(document.getElementById('ca-r-data-'+aid)||{}).value||new Date().toISOString().split('T')[0];
  const imp=parseFloat((document.getElementById('ca-r-imp-'+aid)||{}).value||0);
  const nota=((document.getElementById('ca-r-nota-'+aid)||{}).value||'').trim();
  if(!imp||imp<=0){showToast('Inserisci importo valido','error');return;}
  if(imp>residuo+0.01){showToast('Importo supera il residuo ('+_caFmtAmt(residuo)+')','error');return;}
  const op=_caGetOp(res_el.operatore_id);
  try {
    await apiFetch('/cassa-anticipi/'+aid+'/rimborso',{method:'POST',body:JSON.stringify({data_rimborso:data,importo:imp,nota})});
    showToast('✓ Rimborso '+_caFmtAmt(imp)+' registrato per '+op.nome+' '+op.cognome);
    _caRender();
  } catch(e){showToast(e.message,'error');}
}

async function _caMarkRead(aid){

}

  const pct=gTot>0?Math.round((gRimb/gTot)*100):0;

    const opA=tutti.filter(a=>a.operatore_id===op.id);

async function _caDeleteAllForOp(userId, nomeOp) {
  if (!confirm(`Eliminare TUTTE le spese di ${nomeOp}?\nQuesta azione è irreversibile.`)) return;
  try {
    await apiFetch('/cassa-anticipi/by-operatore/'+userId, {method:'DELETE'});
    showToast('Spese di '+nomeOp+' eliminate');
    renderAdminCassaAnticpi(document.getElementById('content'));
  } catch(e) { showToast('Errore eliminazione','error'); }
}

function toggleAppTheme() {
  const isLight = document.body.classList.toggle('theme-light');
  const pill  = document.getElementById('t-pill');
  const label = document.getElementById('theme-lbl');
  if (pill)  { if(isLight) pill.classList.add('on'); else pill.classList.remove('on'); }
  if (label) label.textContent = isLight ? 'Tema Scuro' : 'Tema Chiaro';
  try { localStorage.setItem('alfa_theme', isLight ? 'light' : 'dark'); } catch(e){}
}

function _vestSetRadio(val) {
  window._VESTF.radio = val;
  ['personale','aziendale','nessuna'].forEach(v => {
    const b = document.getElementById('radio_btn_'+v);
    if(b) b.classList.toggle('on', v===val);
  });
}
function _vestToggle(id, val) {
  ['SI','NO'].forEach(v => { const b=document.getElementById(id+'_'+v); if(b) b.classList.toggle('on',v===val); });
}
function _vestGetToggle(id) {
  if(document.getElementById(id+'_SI')?.classList.contains('on')) return 'SI';
  if(document.getElementById(id+'_NO')?.classList.contains('on')) return 'NO';
  return null;
}
function _vestToggleRich() {
  const c=document.getElementById('vest_richiedi')?.checked;
  const b=document.getElementById('vest_rich_body');
  if(b) b.style.display=c?'block':'none';
}
function _vestCheckAltro() {
  const m=document.getElementById('vest_rich_motivo')?.value;
  const w=document.getElementById('vest_altro_wrap');
  if(w) w.style.display=m==='Altro'?'block':'none';
}
function _vestRenderFoto() {
  const c=document.getElementById('vest_foto_preview'); if(!c) return;
  c.innerHTML=window._VESTF.foto.map((f,i)=>`<div class="vest-foto-item"><img src="${f.data}" alt="foto"><button class="vest-foto-del" onclick="_vestDelFoto(${i})">✕</button></div>`).join('');
  const btn=document.getElementById('vest_foto_add_btn'); if(btn) btn.style.display=window._VESTF.foto.length>=3?'none':'';
}
function _vestDelFoto(i) { window._VESTF.foto.splice(i,1); _vestRenderFoto(); }
function _vestAddFoto(input) {
  const f=input.files[0]; input.value=''; if(!f) return;
  if(!['image/jpeg','image/png','image/webp'].includes(f.type)){showToast('Formato non supportato (jpg/png/webp)','error');return;}
  if(f.size>1024*1024){showToast('Foto troppo grande (max 1MB)','error');return;}
  if(window._VESTF.foto.length>=3){showToast('Massimo 3 foto','error');return;}
  const r=new FileReader(); r.onload=e=>{window._VESTF.foto.push({data:e.target.result});_vestRenderFoto();}; r.readAsDataURL(f);
}
async function _vestSalva() {
  const capiKeys=['giacca','maglietta','pantaloni','felpa']; const body={};
  capiKeys.forEach(k=>{body[k+'_taglia']=document.getElementById('vest_'+k+'_taglia')?.value||null;body[k+'_possesso']=_vestGetToggle('vest_'+k+'_possesso');});
  body.radio_stato = window._VESTF.radio || null;
  if(document.getElementById('vest_richiedi')?.checked){
    body.richiesta_capo=document.getElementById('vest_rich_capo')?.value||null;
    body.richiesta_motivo=document.getElementById('vest_rich_motivo')?.value||null;
    body.richiesta_altro=document.getElementById('vest_rich_altro')?.value||null;
    const ft=window._VESTF.foto;
    body.foto1=ft[0]?.data||null; body.foto2=ft[1]?.data||null; body.foto3=ft[2]?.data||null;
  }
  try { await apiFetch('/vestiario',{method:'POST',body:JSON.stringify(body)}); showToast('✓ Scheda salvata'); renderUserVestiario(document.getElementById('content')); }
  catch(e){showToast('Errore salvataggio','error');}
}

async function _vesaEditMagConf(id) {
  const body = {
    quantita_stock: parseInt(document.getElementById('medit_stock')?.value)||0,
    quantita_disponibile: parseInt(document.getElementById('medit_disp')?.value)||0,
    quantita_assegnata: parseInt(document.getElementById('medit_ass')?.value)||0
  };
  try {
    const r = await apiFetch('/admin/magazzino-vestiario/'+id,{method:'PATCH',body:JSON.stringify(body)});
    const idx = window._VESA.mag.findIndex(x=>x.id===id);
    if(idx>=0) window._VESA.mag[idx] = r;
    closeModalDirect(); showToast('✓ Stock aggiornato');
    _vesaRender(document.getElementById('content'));
  } catch(e){ showToast('Errore aggiornamento','error'); }
}

async function _vesaDeleteMag(id) {
  const m = window._VESA.mag.find(x=>x.id===id); if(!m) return;
  if(!confirm('Eliminare '+m.tipo_capo+' taglia '+m.taglia+' dal magazzino?')) return;
  try {
    await apiFetch('/admin/magazzino-vestiario/'+id,{method:'DELETE'});
    window._VESA.mag = window._VESA.mag.filter(x=>x.id!==id);
    showToast('✓ Voce eliminata');
    _vesaRender(document.getElementById('content'));
  } catch(e){ showToast('Errore eliminazione','error'); }
}

            <td><div style="display:flex;gap:5px">
