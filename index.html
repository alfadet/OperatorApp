<meta name="apple-mobile-web-app-capable" content="yes">

<!-- Export Libraries -->
<script src="libs/jspdf.umd.min.js"></script>
<script src="libs/jspdf.plugin.autotable.min.js"></script>
<script src="libs/xlsx.full.min.js"></script>

<style>
:root {
  --gold: #c9a227;
  --gold-light: #e8c84a;
  --gold-dark: #9a7a1a;
  --bg: #060608;
  --bg2: #0e0e12;
  --bg3: #14141a;
  --bg4: #1c1c24;
  --border: #2a2a35;
  --border-gold: rgba(201,162,39,0.3);
  --text: #e8e8e8;
  --text-muted: #888;
  --red: #c0392b;
  --green: #27ae60;
  --radius: 8px;
}

/* ══ LIGHT THEME ══════════════════════════════════════════════════════════ */
body.theme-light {
  --gold:#9a6f00; --gold-light:#b88a00; --gold-dark:#7a5800;
  --bg:#f5f3ee; --bg2:#eceae3; --bg3:#e3e0d6; --bg4:#d9d5c9;
  --border:#c9c4b3; --border-gold:rgba(154,111,0,.35);
  --text:#1a1608; --text-muted:#6b6050;
  --red:#c0392b; --green:#1e8449;
}
body.theme-light                       { background:var(--bg); color:var(--text); }
body.theme-light .sidebar              { background:var(--bg2); border-right-color:var(--border-gold); }
body.theme-light .topbar               { background:var(--bg2); border-bottom-color:var(--border-gold); }
body.theme-light .main-content         { background:var(--bg); }
body.theme-light .card                 { background:var(--bg2); box-shadow:0 2px 12px rgba(0,0,0,.10); border-color:var(--border); }
body.theme-light .card-title           { border-bottom-color:var(--border); color:var(--gold); }
body.theme-light .stat-card            { background:linear-gradient(135deg,var(--bg3),var(--bg4)); }
body.theme-light .field-input          { background:#fff; color:var(--text); border-color:var(--border); }
body.theme-light .alfa-logo            { filter: brightness(0); }
body.theme-light .nav-item             { color:var(--text); }
body.theme-light .nav-item:hover       { background:rgba(154,111,0,.10); }
body.theme-light .nav-item.active      { background:rgba(154,111,0,.16); color:var(--gold); }
body.theme-light table thead tr        { background:var(--bg3); }
body.theme-light table tbody tr        { border-bottom-color:var(--border); }
body.theme-light table tbody tr:hover  { background:var(--bg3); }
body.theme-light .modal                { background:var(--bg2); border-color:var(--border-gold); }
body.theme-light .modal-title          { border-bottom-color:var(--border); }
body.theme-light .btn-secondary        { background:var(--bg3); color:var(--text); border-color:var(--border); }
body.theme-light .expense-form-wrap    { background:var(--bg3); border-color:var(--border); }
body.theme-light .info-item            { background:var(--bg3); border-color:var(--border); }
body.theme-light .rule-row             { background:var(--bg3); border-color:var(--border); }
body.theme-light .incoming-msg-item    { background:var(--bg3); border-color:var(--border); }
body.theme-light .info-admin-row       { background:var(--bg3); border-color:var(--border); }
body.theme-light .msg-item             { background:var(--bg3); border-color:var(--border); }
body.theme-light .urgent-item          { background:rgba(154,111,0,.10); }
body.theme-light .export-bar           { background:var(--bg3); border-color:var(--border-gold); }
body.theme-light .expense-item         { background:var(--bg3); border-color:var(--border); }
body.theme-light .month-block          { background:var(--bg2); border-color:var(--border); }
body.theme-light .splash               { background:#1a1608; }
body.theme-light ::-webkit-scrollbar-track { background:var(--bg2); }
body.theme-light ::-webkit-scrollbar-thumb { background:var(--gold-dark); }


/* == REPORT MESE == */
.report-wrap{display:flex;flex-direction:column;align-items:center;padding:36px 24px;gap:0}
.report-card{background:var(--bg2);border:1px solid var(--border-gold);border-radius:18px;padding:44px 40px 50px;width:100%;max-width:720px;text-align:center}
.report-hdr{font-family:Cinzel,serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.report-ai-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;border:1px solid var(--border);border-radius:20px;padding:3px 14px;margin-bottom:28px;background:var(--bg3)}
.report-sep{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 20px}
.report-section-title{font-family:Cinzel,serif;font-size:15px;font-weight:700;color:var(--text);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
.report-btns{display:flex;flex-direction:column;gap:16px;align-items:center;width:100%;max-width:440px;margin:0 auto}
.btn-report{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:18px 28px;border:none;border-radius:14px;cursor:pointer;text-decoration:none;color:#fff;font-family:Cinzel,serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.btn-report:hover{transform:translateY(-3px)}
.btn-report-icon{font-size:22px}
.btn-report-green{background:linear-gradient(135deg,#0a6e35,#18b04a,#2ed667);box-shadow:0 6px 22px rgba(30,180,80,.45)}
.btn-report-green:hover{box-shadow:0 10px 30px rgba(30,180,80,.65)}
.btn-report-red{background:linear-gradient(135deg,#8b0000,#c0392b,#e74c3c);box-shadow:0 6px 22px rgba(192,57,43,.45)}
.btn-report-red:hover{box-shadow:0 10px 30px rgba(192,57,43,.65)}
.btn-report-gold{background:linear-gradient(135deg,#7a5800,#c9a227,#e8c84a);box-shadow:0 6px 22px rgba(201,162,39,.45)}
.btn-report-gold:hover{box-shadow:0 10px 30px rgba(201,162,39,.65)}
/* == SIDEBAR QUICK LINKS == */
.nav-qlinks-label{font-size:10px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;padding:6px 18px 4px;opacity:.7}
.nav-qlink{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:2px 4px;border-radius:var(--radius);cursor:pointer;text-decoration:none;font-size:13px;font-weight:600;color:#fff;transition:opacity .2s,transform .15s;letter-spacing:.5px}
.nav-qlink:hover{opacity:.88;transform:translateX(2px)}
.nav-qlink-icon{font-size:15px;flex-shrink:0}
.nav-qlink.ql-pec{background:linear-gradient(90deg,#1a3a6e,#2756b0)}
.nav-qlink.ql-drive{background:linear-gradient(90deg,#1d6b3e,#28a35e)}
.nav-qlink.ql-trello{background:linear-gradient(90deg,#0552a4,#0065bd)}
.nav-qlink.ql-quest{background:linear-gradient(90deg,#8b0000,#c0392b)}

/* ══ PREVENTIVI ════════════════════════════════════════════════════════════ */
.preventivi-wrap {
  display:flex; flex-direction:column; align-items:center;
  justify-content:flex-start; padding:48px 24px; gap:0;
}
.preventivi-card {
  background:var(--bg2); border:1px solid var(--border-gold);
  border-radius:18px; padding:48px 40px 52px;
  width:100%; max-width:700px; text-align:center;
}
.preventivi-hdr {
  font-family:'Cinzel',serif; font-size:21px; font-weight:700;
  color:var(--gold); letter-spacing:3px; text-transform:uppercase;
  margin-bottom:10px;
}
.preventivi-sep {
  width:60px; height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:0 auto 14px;
}
.preventivi-sub {
  font-size:13px; color:var(--text-muted); letter-spacing:1px; margin-bottom:44px;
}
.preventivi-btns { display:flex; gap:32px; flex-wrap:wrap; justify-content:center; }
.btn-ext {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; width:210px; height:170px;
  border:none; border-radius:18px; cursor:pointer;
  text-decoration:none; color:#fff;
  transition:transform .22s, box-shadow .22s;
  position:relative; overflow:hidden;
}
.btn-ext::after {
  content:''; position:absolute; inset:0;
  background:rgba(255,255,255,.09); opacity:0; transition:opacity .2s;
}
.btn-ext:hover::after { opacity:1; }
.btn-ext:hover { transform:translateY(-6px); }
.btn-ext-icon { font-size:48px; line-height:1; }
.btn-ext-label { font-family:'Cinzel',serif; font-size:14px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; }
.btn-prev1 {
  background:linear-gradient(140deg,#0a6e35,#18b04a,#2ed667);
  box-shadow:0 8px 28px rgba(30,180,80,.50),0 2px 8px rgba(30,180,80,.30);
}
.btn-prev1:hover { box-shadow:0 14px 40px rgba(30,180,80,.70),0 4px 14px rgba(30,180,80,.45); }
.btn-prev2 {
  background:linear-gradient(140deg,#085e4e,#12967a,#18c79a);
  box-shadow:0 8px 28px rgba(20,160,130,.50),0 2px 8px rgba(20,160,130,.30);
}
.btn-prev2:hover { box-shadow:0 14px 40px rgba(20,160,130,.70),0 4px 14px rgba(20,160,130,.45); }

/* ══ SIDEBAR THEME TOGGLE ══════════════════════════════════════════════════ */
.nav-divider { height:1px; background:var(--border-gold); margin:10px 14px; opacity:.5; }
.nav-theme-row {
  display:flex; align-items:center; gap:8px;
  padding:10px 14px; cursor:pointer; user-select:none;
  border-radius:var(--radius); margin:0 4px;
  transition:background .18s;
}
.nav-theme-row:hover { background:rgba(201,162,39,.10); }
.nav-theme-label { flex:1; font-size:13px; color:var(--text-muted); }
.t-pill {
  width:42px; height:23px; border-radius:12px;
  background:var(--bg4); border:1px solid var(--border);
  position:relative; flex-shrink:0; transition:background .3s,border-color .3s;
}
.t-pill.on { background:var(--gold); border-color:var(--gold-light); }
.t-pill-dot {
  position:absolute; top:3px; left:3px;
  width:15px; height:15px; border-radius:50%;
  background:var(--text-muted); transition:all .28s;
}
.t-pill.on .t-pill-dot { left:22px; background:#fff; }

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; font-family:'Exo 2',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }

/* SCROLLBAR */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--gold-dark); border-radius:3px; }

/* ===== SPLASH SCREEN ===== */
#splash {
  position:fixed; inset:0; z-index:9999;
  background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background-image: radial-gradient(ellipse at 50% 50%, rgba(201,162,39,0.04) 0%, transparent 70%);
}
#splash .grid-bg {
  position:absolute; inset:0; opacity:0.03;
  background-image: linear-gradient(var(--gold) 1px,transparent 1px), linear-gradient(90deg,var(--gold) 1px,transparent 1px);
  background-size:60px 60px;
}
#splash-logo { width:320px; max-width:80vw; animation:fadeInDown 0.8s ease; }
#splash-title {
  font-family:'Cinzel',serif; font-size:13px; letter-spacing:6px;
  color:var(--text-muted); margin-top:12px; text-transform:uppercase;
  animation:fadeInDown 0.8s 0.2s both ease;
}
#splash-bar-wrap {
  width:320px; max-width:80vw; margin-top:40px;
  animation:fadeIn 0.5s 0.5s both;
}
#splash-bar-bg {
  height:3px; background:var(--bg4); border-radius:2px; overflow:hidden;
  box-shadow: 0 0 10px rgba(201,162,39,0.1);
}
#splash-bar {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
  transition:width 0.4s ease;
  box-shadow: 0 0 12px rgba(201,162,39,0.6);
}
#splash-status {
  font-size:11px; letter-spacing:2px; color:var(--text-muted);
  margin-top:12px; text-align:center; min-height:16px;
  font-family:'Cinzel',serif; text-transform:uppercase;
}

/* ===== MAIN APP ===== */
#app { display:none; height:100%; }

/* ===== AUTH ===== */
#auth-screen {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg);
  background-image: radial-gradient(ellipse at 50% 30%, rgba(201,162,39,0.05) 0%, transparent 60%);
  padding:20px;
}
.auth-box {
  width:100%; max-width:420px;
  background:var(--bg2);
  border:1px solid var(--border-gold);
  border-radius:12px;
  padding:40px 36px;
  box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(201,162,39,0.06);
}
.auth-logo { display:block; width:200px; margin:0 auto 28px; }
.auth-divider {
  height:1px; margin:20px 0;
  background:linear-gradient(90deg,transparent,var(--gold-dark),transparent);
}
.auth-title {
  font-family:'Cinzel',serif; font-size:14px; letter-spacing:4px;
  color:var(--gold); text-align:center; margin-bottom:28px;
  text-transform:uppercase;
}
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:11px; letter-spacing:2px; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; }
.form-group input {
  width:100%; padding:12px 14px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font-family:'Exo 2',sans-serif; font-size:14px;
  transition:border-color 0.2s;
  outline:none;
}
.form-group input:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(201,162,39,0.1); }
.btn-gold {
  width:100%; padding:13px;
  background:linear-gradient(135deg, var(--gold-dark), var(--gold));
  border:none; border-radius:var(--radius);
  color:#000; font-family:'Cinzel',serif; font-size:13px;
  letter-spacing:3px; font-weight:600; text-transform:uppercase;
  cursor:pointer; transition:all 0.3s;
  box-shadow: 0 4px 15px rgba(201,162,39,0.3);
}
.btn-gold:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(201,162,39,0.4); filter:brightness(1.1); }
.auth-link { text-align:center; margin-top:16px; font-size:13px; color:var(--text-muted); }
.auth-link a { color:var(--gold); text-decoration:none; cursor:pointer; }
.auth-link a:hover { color:var(--gold-light); }
.error-msg {
  background:rgba(192,57,43,0.15); border:1px solid rgba(192,57,43,0.4);
  color:#e74c3c; border-radius:var(--radius); padding:10px 14px;
  font-size:13px; margin-bottom:16px; display:none;
}
.error-msg.show { display:block; }

/* ===== LAYOUT ===== */
#main-layout { display:none; height:100vh; flex-direction:column; }
.topbar {
  height:60px; background:var(--bg2);
  border-bottom:1px solid var(--border-gold);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; flex-shrink:0;
  box-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
.topbar-left { display:flex; align-items:center; gap:14px; }
.topbar-logo { height:32px; }
.topbar-title { font-family:'Cinzel',serif; font-size:13px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; }
.topbar-right { display:flex; align-items:center; gap:16px; }
.user-badge {
  font-size:12px; color:var(--text-muted); letter-spacing:1px;
}
.btn-logout {
  padding:7px 18px;
  background:transparent; border:1px solid var(--border-gold);
  color:var(--gold); border-radius:var(--radius);
  font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px;
  cursor:pointer; transition:all 0.2s; text-transform:uppercase;
}
.btn-logout:hover { background:rgba(201,162,39,0.1); }
/* Gestione Utenti */
.gu-table { width:100%; border-collapse:collapse; }
.gu-table th { font-size:10px; letter-spacing:2px; color:var(--gold); text-transform:uppercase; padding:8px 12px; border-bottom:1px solid var(--border-gold); text-align:left; }
.gu-table td { padding:11px 12px; border-bottom:1px solid var(--border); font-size:13px; color:var(--text); vertical-align:middle; }
.gu-table tr:hover td { background:rgba(255,255,255,0.03); }
.gu-badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:10px; font-weight:700; letter-spacing:1px; }
.gu-badge.attivo { background:rgba(46,204,113,0.15); color:#2ecc71; border:1px solid rgba(46,204,113,0.3); }
.gu-badge.bloccato { background:rgba(231,76,60,0.15); color:#e74c3c; border:1px solid rgba(231,76,60,0.3); }
.gu-actions { display:flex; gap:6px; flex-wrap:wrap; }
.btn-utility {
  padding:7px 16px; background:transparent;
  border:1px solid #27ae60; color:#2ecc71;
  border-radius:var(--radius); font-family:'Exo 2',sans-serif;
  font-size:11px; letter-spacing:1px; font-weight:700;
  cursor:pointer; transition:all 0.2s;
}
.btn-utility:hover { background:rgba(46,204,113,0.12); }
/* Utility Modal — DB Stats */
.modal-wide { max-width:780px !important; }
.db-total-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:24px; }
.db-stat-card { background:var(--bg3); border:1px solid var(--border-gold); border-radius:10px; padding:18px 20px; text-align:center; }
.db-stat-card .val { font-family:'Cinzel',serif; font-size:1.8rem; color:var(--gold); font-weight:700; line-height:1; }
.db-stat-card .lbl { font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; margin-top:6px; }
.db-table-row { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:14px 18px; margin-bottom:10px; }
.db-table-row-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
.db-table-name { font-size:14px; font-weight:700; color:var(--text); letter-spacing:1px; }
.db-table-meta { font-size:12px; color:var(--text-muted); }
.db-table-mb { font-family:'Cinzel',serif; font-size:1.1rem; font-weight:700; }
.db-bar-track { background:var(--bg4); border-radius:6px; height:16px; overflow:hidden; }
.db-bar-fill { height:100%; border-radius:6px; transition:width 0.8s cubic-bezier(.22,1,.36,1); }

.main-body { display:flex; flex:1; overflow:hidden; }

/* SIDEBAR */
.sidebar {
  width:220px; background:var(--bg2);
  border-right:1px solid var(--border);
  padding:20px 0; flex-shrink:0;
  display:flex; flex-direction:column;
}
.nav-item {
  padding:12px 24px; display:flex; align-items:center; gap:12px;
  cursor:pointer; transition:all 0.2s;
  font-size:13px; color:var(--text-muted); letter-spacing:1px;
  border-left:3px solid transparent;
}
.nav-item:hover { background:var(--bg3); color:var(--text); }
.nav-item.active { background:var(--bg3); color:var(--gold); border-left-color:var(--gold); }
.nav-icon { font-size:16px; width:20px; text-align:center; }
.nav-badge {
  margin-left:auto; background:var(--red); color:#fff;
  border-radius:10px; padding:2px 7px; font-size:10px; font-weight:600;
}

/* CONTENT */
.content { flex:1; overflow-y:auto; padding:28px; background:var(--bg); }
.page { display:none; }
.page.active { display:block; }

/* CARDS */
.card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:10px; padding:24px; margin-bottom:20px;
}
.card-title {
  font-family:'Cinzel',serif; font-size:13px; letter-spacing:3px;
  color:var(--gold); text-transform:uppercase; margin-bottom:20px;
  padding-bottom:12px; border-bottom:1px solid var(--border-gold);
  display:flex; align-items:center; gap:10px;
}
.welcome-name {
  font-family:'Cinzel',serif; font-size:26px; color:var(--gold);
  font-weight:700; letter-spacing:2px;
}
.welcome-sub { font-size:13px; color:var(--text-muted); margin-top:4px; letter-spacing:1px; }

/* FORM GRID */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-grid .full { grid-column:1/-1; }
.field-group { display:flex; flex-direction:column; gap:6px; }
.field-label { font-size:11px; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; }
.field-input {
  padding:10px 14px; background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font-family:'Exo 2',sans-serif; font-size:13px; outline:none;
  transition:border-color 0.2s;
}
.field-input:focus { border-color:var(--gold); }
.field-input:disabled { opacity:0.5; cursor:not-allowed; }
.field-input[readonly] { opacity:0.6; }
.btn-row { display:flex; gap:10px; margin-top:16px; }
.btn-sm {
  padding:8px 20px; border-radius:var(--radius); border:none;
  font-family:'Exo 2',sans-serif; font-size:12px; letter-spacing:1px;
  cursor:pointer; transition:all 0.2s; font-weight:600;
}
.btn-primary { background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:#000; }
.btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
.btn-secondary { background:var(--bg4); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--gold); color:var(--gold); }
.btn-danger { background:rgba(192,57,43,0.2); color:#e74c3c; border:1px solid rgba(192,57,43,0.3); }
.btn-danger:hover { background:rgba(192,57,43,0.35); }

/* DOCUMENTS */
.doc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; }
.doc-slot {
  border:2px dashed var(--border); border-radius:10px;
  padding:20px 14px; text-align:center; cursor:pointer;
  transition:all 0.3s; position:relative; min-height:160px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--bg3);
}
.doc-slot:hover { border-color:var(--gold); background:var(--bg4); }
.doc-slot.filled { border-style:solid; border-color:var(--border-gold); cursor:default; }
.doc-slot.required { border-color:rgba(201,162,39,0.2); }
.doc-icon { font-size:32px; margin-bottom:10px; }
.doc-name { font-size:11px; letter-spacing:1px; color:var(--text-muted); text-transform:uppercase; }
.doc-badge {
  font-size:9px; letter-spacing:1px; padding:2px 8px; border-radius:10px;
  margin-top:6px; text-transform:uppercase;
}
.badge-required { background:rgba(201,162,39,0.15); color:var(--gold); }
.badge-optional { background:var(--bg4); color:var(--text-muted); border:1px solid var(--border); }
.badge-uploaded { background:rgba(39,174,96,0.15); color:#2ecc71; }
.doc-date { font-size:10px; color:var(--text-muted); margin-top:4px; }
.doc-preview {
  width:100%; height:80px; object-fit:cover;
  border-radius:4px; margin-bottom:8px;
}
.doc-actions { display:flex; gap:6px; margin-top:8px; }
.doc-btn {
  flex:1; padding:5px 8px; border-radius:4px; border:none;
  font-size:10px; cursor:pointer; transition:all 0.2s;
}
.doc-upload-input { display:none; }

/* ERROR BANNER */
.error-banner {
  background:rgba(192,57,43,0.15); border:1px solid rgba(192,57,43,0.5);
  border-left:4px solid #e74c3c; border-radius:var(--radius);
  padding:14px 16px; margin-bottom:16px; display:none;
  font-size:13px; line-height:1.6; color:#e74c3c;
}
.error-banner.show { display:block; }

/* MESSAGES FEED */
.msg-feed { display:flex; flex-direction:column; gap:12px; }
.msg-item {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px;
  transition:border-color 0.2s;
}
.msg-item.unread { border-color:var(--border-gold); background:rgba(201,162,39,0.04); }
.msg-item.unread::before {
  content:''; display:inline-block; width:6px; height:6px;
  background:var(--gold); border-radius:50%; margin-right:8px;
  vertical-align:middle;
}
.msg-meta { font-size:11px; color:var(--text-muted); margin-bottom:8px; letter-spacing:1px; }
.msg-text { font-size:13px; line-height:1.6; }
.msg-file { margin-top:8px; }
.msg-file a {
  display:inline-flex; align-items:center; gap:6px;
  font-size:12px; color:var(--gold); text-decoration:none;
  padding:5px 12px; border:1px solid var(--border-gold);
  border-radius:4px; transition:all 0.2s;
}
.msg-file a:hover { background:rgba(201,162,39,0.1); }

/* ADMIN TABLE */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead tr { border-bottom:2px solid var(--border-gold); }
th {
  padding:12px 14px; text-align:left;
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px;
  color:var(--gold); text-transform:uppercase; font-weight:600;
}
td { padding:12px 14px; border-bottom:1px solid var(--border); color:var(--text-muted); }
tr:hover td { background:var(--bg3); }
.action-btns { display:flex; gap:6px; }
.empty-state {
  text-align:center; padding:60px 20px;
  color:var(--text-muted); font-size:13px;
}
.empty-icon { font-size:48px; margin-bottom:16px; opacity:0.3; }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,0.8); backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--bg2); border:1px solid var(--border-gold);
  border-radius:12px; padding:28px; width:100%; max-width:560px;
  max-height:90vh; overflow-y:auto;
  animation:slideUp 0.3s ease;
}
.modal-title {
  font-family:'Cinzel',serif; font-size:14px; letter-spacing:3px;
  color:var(--gold); text-transform:uppercase; margin-bottom:20px;
  display:flex; align-items:center; justify-content:space-between;
}
.modal-close { cursor:pointer; color:var(--text-muted); font-size:20px; line-height:1; }
.modal-close:hover { color:var(--gold); }

/* STATS */
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
.stat-card {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; padding:16px; text-align:center;
}
.stat-num { font-family:'Cinzel',serif; font-size:28px; color:var(--gold); font-weight:700; }
.stat-label { font-size:10px; letter-spacing:2px; color:var(--text-muted); margin-top:4px; text-transform:uppercase; }

/* TOAST */
#toast {
  position:fixed; bottom:24px; right:24px; z-index:9998;
  padding:12px 20px; border-radius:var(--radius);
  font-size:13px; font-weight:500; letter-spacing:0.5px;
  opacity:0; transform:translateY(10px);
  transition:all 0.3s; pointer-events:none;
  max-width:320px;
}
#toast.success { background:#1a3d2b; border:1px solid #27ae60; color:#2ecc71; opacity:1; transform:translateY(0); }
#toast.error { background:#3d1a1a; border:1px solid #c0392b; color:#e74c3c; opacity:1; transform:translateY(0); }

/* PROFILE DETAIL */
.profile-detail { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.profile-field { padding:10px; background:var(--bg3); border-radius:6px; }
.profile-field-label { font-size:10px; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; }
.profile-field-val { font-size:13px; color:var(--text); margin-top:3px; }

/* COMMUNICATIONS */
.comm-section { margin-bottom:24px; }
.comm-section .section-label {
  font-size:11px; letter-spacing:3px; color:var(--gold); text-transform:uppercase;
  margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border);
}
textarea.field-input { resize:vertical; min-height:100px; line-height:1.5; }

/* URGENT MESSAGES */
.urgent-feed { display:flex; flex-direction:column; gap:14px; margin-bottom:20px; }
.urgent-item {
  background: linear-gradient(135deg, #2a2000, #1a1500);
  border: 2px solid #f1c40f;
  border-left: 6px solid #e74c3c;
  border-radius: 10px;
  padding: 16px 18px;
  position: relative;
  animation: urgentPulse 2s ease-in-out infinite;
}
.urgent-item .badge-urgente {
  display: inline-block;
  background: #e74c3c;
  color: #fff;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.urgent-item .urgent-timer {
  font-size: 11px;
  color: #f1c40f;
  letter-spacing: 1px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.urgent-item .urgent-text {
  color: #f1c40f;
  font-weight: 700;
  font-size: 15px;
  line-height: 1.6;
  letter-spacing: 0.3px;
}
.urgent-item .urgent-actions {
  margin-top: 10px;
  display: flex;
  gap: 8px;
}
.urgent-admin-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
.urgent-admin-item {
  background: var(--bg3);
  border: 1px solid rgba(241,196,15,0.3);
  border-left: 4px solid #f1c40f;
  border-radius: 8px;
  padding: 14px 16px;
}
.urgent-admin-meta { font-size:11px; color:var(--text-muted); margin-bottom:6px; letter-spacing:1px; }
.urgent-admin-text { font-size:13px; color:var(--text); font-weight:600; margin-bottom:8px; }
.urgent-expired { opacity: 0.4; border-left-color: var(--border); }
.urgent-countdown { 
  font-size: 11px; color: #f1c40f; font-weight: 600;
  background: rgba(241,196,15,0.08);
  padding: 2px 8px; border-radius: 4px; display:inline-block;
}
.urgent-countdown.expiring { color: #e74c3c; animation: urgentPulse 1s ease-in-out infinite; }
@keyframes urgentPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(241,196,15,0); }
  50% { box-shadow: 0 0 16px 2px rgba(241,196,15,0.15); }
}
.duration-select {
  padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: 'Exo 2', sans-serif; font-size: 13px; outline: none;
  transition: border-color 0.2s; cursor: pointer;
}
.duration-select:focus { border-color: #f1c40f; }

/* EXPENSES */
.expense-warning {
  background: linear-gradient(135deg, rgba(231,76,60,0.12), rgba(192,57,43,0.08));
  border: 1px solid rgba(231,76,60,0.4);
  border-left: 5px solid #e74c3c;
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 24px;
  display: flex; align-items: flex-start; gap: 12px;
}
.expense-warning .warn-icon { font-size: 22px; flex-shrink:0; margin-top:2px; }
.expense-warning .warn-text { font-size: 13px; line-height: 1.7; color: #e74c3c; font-weight: 600; letter-spacing: 0.3px; }
.expense-form-wrap {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 22px;
  margin-bottom: 24px;
}
.expense-form-title {
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 18px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border-gold);
}
.solo-checkbox-wrap {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--bg4); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer;
  transition: all 0.2s; user-select: none;
}
.solo-checkbox-wrap:hover { border-color: var(--gold); }
.solo-checkbox-wrap.checked { border-color: var(--gold); background: rgba(201,162,39,0.08); }
.solo-checkbox-wrap input[type=checkbox] { display:none; }
.custom-checkbox {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-radius: 4px; flex-shrink: 0; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.2s; background: var(--bg3);
}
.solo-checkbox-wrap.checked .custom-checkbox {
  background: var(--gold); border-color: var(--gold); color: #000; font-size: 13px;
}
.solo-label { font-size: 14px; font-weight: 600; color: var(--text); }
.solo-sublabel { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.expense-list { display: flex; flex-direction: column; gap: 12px; }
.expense-item {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px;
  transition: border-color 0.2s;
  position: relative;
}
.expense-item:hover { border-color: var(--border-gold); }
.expense-item-header {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  margin-bottom: 10px;
}
.expense-luogo {
  font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.3px;
  display: flex; align-items: center; gap: 8px;
}
.expense-data {
  font-family: 'Cinzel', serif; font-size: 12px;
  color: var(--gold); letter-spacing: 1px; white-space: nowrap;
}
.expense-solo-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 10px; border-radius: 12px; font-weight: 600;
  background: rgba(201,162,39,0.12); color: var(--gold);
  border: 1px solid var(--border-gold); margin-top: 6px;
}
.expense-note {
  font-size: 13px; color: var(--text-muted); line-height: 1.6;
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--border);
  font-style: italic;
}
.expense-actions { display: flex; gap: 6px; margin-top: 10px; }
.exp-month-header {
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
  color: var(--text-muted); text-transform: uppercase;
  padding: 8px 0 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px; margin-top: 6px;
}
.empty-expenses {
  text-align: center; padding: 40px 20px;
  color: var(--text-muted); font-size: 13px;
}

/* ADMIN EXPENSES */
.search-bar-wrap {
  display: flex; gap: 10px; margin-bottom: 24px; align-items: center;
}
.search-input {
  flex: 1; padding: 11px 16px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: 'Exo 2', sans-serif; font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: var(--text-muted); }
.month-block {
  margin-bottom: 28px;
}
.month-block-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  background: linear-gradient(135deg, var(--bg3), var(--bg4));
  border: 1px solid var(--border-gold);
  border-radius: 8px 8px 0 0;
  margin-bottom: 0;
}
.month-block-title {
  font-family: 'Cinzel', serif; font-size: 13px;
  color: var(--gold); letter-spacing: 3px; text-transform: uppercase;
}
.month-block-stats {
  display: flex; gap: 16px; align-items: center;
}
.month-stat {
  font-size: 11px; color: var(--text-muted); letter-spacing: 1px;
  background: var(--bg4); padding: 3px 10px; border-radius: 4px;
}
.month-stat strong { color: var(--text); }
.admin-exp-table {
  width: 100%; border-collapse: collapse;
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 8px 8px; overflow: hidden;
}
.admin-exp-table thead tr {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
}
.admin-exp-table th {
  padding: 10px 12px; text-align: left;
  font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: 2px; color: var(--text-muted);
  text-transform: uppercase; font-weight: 600;
}
.admin-exp-table td {
  padding: 11px 12px; border-bottom: 1px solid var(--border);
  font-size: 13px; color: var(--text); vertical-align: middle;
}
.admin-exp-table tr:last-child td { border-bottom: none; }
.admin-exp-table tr:hover td { background: var(--bg3); }
.pagato-toggle {
  display: inline-flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
}
.toggle-pill {
  width: 42px; height: 22px; border-radius: 11px;
  background: var(--bg4); border: 1px solid var(--border);
  position: relative; transition: all 0.25s; flex-shrink: 0;
}
.toggle-pill::after {
  content: ''; position: absolute;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--text-muted); top: 2px; left: 2px;
  transition: all 0.25s;
}
.pagato-toggle.on .toggle-pill {
  background: rgba(39,174,96,0.2);
  border-color: #27ae60;
}
.pagato-toggle.on .toggle-pill::after {
  background: #2ecc71; left: 22px;
}
.pagato-label {
  font-size: 11px; letter-spacing: 1px; font-weight: 600;
  text-transform: uppercase;
}
.pagato-toggle.on .pagato-label { color: #2ecc71; }
.pagato-toggle:not(.on) .pagato-label { color: var(--text-muted); }
.operator-name-cell {
  font-weight: 700; color: var(--text);
  display: flex; flex-direction: column; gap: 2px;
}
.operator-email-cell { font-size: 11px; color: var(--text-muted); }
.solo-chip {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  font-weight: 600; letter-spacing: 0.5px; white-space: nowrap;
}
.solo-chip.yes { background: rgba(201,162,39,0.12); color: var(--gold); border: 1px solid var(--border-gold); }
.solo-chip.no  { background: var(--bg4); color: var(--text-muted); border: 1px solid var(--border); }
.note-cell { font-style: italic; color: var(--text-muted); font-size: 12px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.exp-search-result {
  background: var(--bg2); border: 1px solid var(--border-gold);
  border-radius: 10px; padding: 20px; margin-bottom: 20px;
}
.exp-search-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border-gold);
}
.exp-search-name {
  font-family: 'Cinzel', serif; font-size: 15px;
  color: var(--gold); font-weight: 700;
}
.exp-count-badge {
  background: rgba(201,162,39,0.1); color: var(--gold);
  border: 1px solid var(--border-gold);
  font-size: 11px; padding: 3px 10px; border-radius: 10px;
  letter-spacing: 1px;
}
.no-results {
  text-align: center; padding: 40px 20px;
  color: var(--text-muted); font-size: 13px;
}

/* EXPORT BUTTONS */
.export-bar {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px;
  padding: 16px 18px;
  background: linear-gradient(135deg, var(--bg3), var(--bg4));
  border: 1px solid var(--border-gold);
  border-radius: 10px; align-items: center;
}
.export-bar-label {
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px;
  color: var(--text-muted); text-transform: uppercase; margin-right: 6px;
  flex-shrink: 0;
}
.btn-export {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: var(--radius); border: none;
  font-family: 'Exo 2', sans-serif; font-size: 12px; font-weight: 600;
  letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.btn-export-pdf {
  background: linear-gradient(135deg, #922b21, #e74c3c);
  color: #fff; box-shadow: 0 3px 12px rgba(231,76,60,0.3);
}
.btn-export-pdf:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 5px 16px rgba(231,76,60,0.4); }
.btn-export-sheets {
  background: linear-gradient(135deg, #1a6b34, #27ae60);
  color: #fff; box-shadow: 0 3px 12px rgba(39,174,96,0.3);
}
.btn-export-sheets:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 5px 16px rgba(39,174,96,0.4); }
.btn-export-drive {
  background: linear-gradient(135deg, #1a4d8f, #2980b9);
  color: #fff; box-shadow: 0 3px 12px rgba(41,128,185,0.3);
}
.btn-export-drive:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 5px 16px rgba(41,128,185,0.4); }
.drive-config-box {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px; margin-top: 12px;
  font-size: 12px; color: var(--text-muted); line-height: 1.7;
}
.drive-config-box a { color: var(--gold); }
.export-spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* DOC LEGEND */
.doc-legend {
  margin-top: 28px; padding: 18px 20px;
  background: var(--bg3); border: 1px solid var(--border);
  border-left: 4px solid var(--gold); border-radius: 8px;
}
.doc-legend-title {
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 2px;
  color: var(--gold); text-transform: uppercase; margin-bottom: 14px;
}
.doc-legend-list {
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-direction: column; gap: 9px;
}
.doc-legend-list li {
  font-size: 13px; color: var(--text-muted); line-height: 1.6;
  padding-left: 8px; border-left: 2px solid var(--border);
}
.doc-legend-list li strong { color: var(--text); }

/* INFO SECTION */
.info-item {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 10px; overflow: hidden;
  transition: border-color 0.2s;
}
.info-item:hover { border-color: var(--border-gold); }
.info-item-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; cursor: pointer; user-select: none;
  gap: 12px;
}
.info-item-num {
  font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold);
  letter-spacing: 2px; flex-shrink: 0;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(201,162,39,0.1); border: 1px solid var(--border-gold);
  display: flex; align-items: center; justify-content: center;
}
.info-item-preview {
  flex: 1; font-size: 13px; color: var(--text); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.info-chevron {
  font-size: 12px; color: var(--text-muted);
  transition: transform 0.3s; flex-shrink: 0;
}
.info-item.open .info-chevron { transform: rotate(180deg); }
.info-item-body {
  display: none; padding: 0 18px 16px; 
  font-size: 13px; color: var(--text-muted); line-height: 1.8;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}
.info-item.open .info-item-body { display: block; }

/* RULES SECTION */
.rules-alert {
  background: linear-gradient(135deg, rgba(231,76,60,0.12), rgba(192,57,43,0.06));
  border: 1px solid rgba(231,76,60,0.3); border-left: 5px solid #e74c3c;
  border-radius: var(--radius); padding: 16px 18px; margin-bottom: 20px;
  font-size: 13px; color: #e74c3c; font-weight: 600; line-height: 1.7;
}
.rule-row {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 18px; margin-bottom: 12px;
  transition: border-color 0.2s;
}
.rule-row:hover { border-color: var(--border-gold); }
.rule-row-text { font-size: 14px; color: var(--text); line-height: 1.7; margin-bottom: 14px; }
.rule-row-num {
  font-family: 'Cinzel', serif; font-size: 10px; color: var(--gold);
  letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase;
}
.rule-buttons { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn-accept {
  padding: 7px 18px; border-radius: var(--radius); border: none;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.5px;
}
.btn-accept.yes {
  background: rgba(39,174,96,0.15); color: #2ecc71;
  border: 1px solid rgba(39,174,96,0.4);
}
.btn-accept.yes.active, .btn-accept.yes:hover { background: rgba(39,174,96,0.3); }
.btn-accept.no {
  background: rgba(231,76,60,0.12); color: #e74c3c;
  border: 1px solid rgba(231,76,60,0.3);
}
.btn-accept.no.active, .btn-accept.no:hover { background: rgba(231,76,60,0.25); }
.btn-accept.view {
  background: rgba(201,162,39,0.1); color: var(--gold);
  border: 1px solid var(--border-gold);
}
.btn-accept.view.active, .btn-accept.view:hover { background: rgba(201,162,39,0.2); }
.rule-status-badge {
  font-size: 11px; padding: 3px 10px; border-radius: 10px;
  font-weight: 600; letter-spacing: 0.5px; margin-left: auto;
}
.rule-status-badge.accepted { background: rgba(39,174,96,0.15); color: #2ecc71; border: 1px solid rgba(39,174,96,0.3); }
.rule-status-badge.rejected { background: rgba(231,76,60,0.12); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
.rule-status-badge.viewed   { background: rgba(201,162,39,0.1); color: var(--gold); border: 1px solid var(--border-gold); }
.rule-status-badge.pending  { background: var(--bg4); color: var(--text-muted); border: 1px solid var(--border); }
.rules-log-item {
  display: grid; grid-template-columns: 160px 1fr 1fr auto;
  gap: 12px; align-items: center;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.rules-log-item:last-child { border-bottom: none; }
.rules-log-item:hover { background: var(--bg3); }

/* ADMIN INFO / RULES MANAGEMENT */
.info-admin-row {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px; margin-bottom: 10px;
  display: flex; align-items: flex-start; gap: 12px;
}
.info-admin-num {
  font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold);
  background: rgba(201,162,39,0.1); border: 1px solid var(--border-gold);
  border-radius: 50%; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.info-admin-text { flex: 1; font-size: 13px; color: var(--text); line-height: 1.6; }
.info-admin-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* INCOMING MESSAGES */
.incoming-msg-item {
  background: var(--bg3); border: 1px solid var(--border);
  border-left: 4px solid var(--gold); border-radius: 8px;
  padding: 16px 18px; margin-bottom: 12px; transition: border-color 0.2s;
}
.incoming-msg-item:hover { border-color: var(--border-gold); }
.incoming-msg-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px; margin-bottom: 10px;
}
.incoming-from {
  font-weight: 700; color: var(--text); font-size: 14px;
  display: flex; align-items: center; gap: 8px;
}
.incoming-time {
  font-family: 'Cinzel',serif; font-size: 10px; color: var(--text-muted);
  letter-spacing: 1px;
}
.incoming-testo {
  font-size: 13px; color: var(--text-muted); line-height: 1.7;
  padding: 10px 12px; background: var(--bg4);
  border-radius: 6px; margin-bottom: 10px;
}
.incoming-reply-wrap {
  border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px;
}
.incoming-reply-sent {
  font-size: 12px; color: #2ecc71; font-style: italic;
  padding: 8px 12px; background: rgba(39,174,96,0.06);
  border-radius: 6px; margin-bottom: 6px;
}
.user-msg-send-box {
  background: var(--bg3); border: 1px solid var(--border-gold);
  border-radius: 10px; padding: 20px 22px; margin-top: 24px;
}
.user-msg-send-title {
  font-family: 'Cinzel',serif; font-size: 12px; letter-spacing: 2px;
  color: var(--gold); text-transform: uppercase; margin-bottom: 14px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border-gold);
}
.user-sent-msg-item {
  background: var(--bg4); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
}
.user-sent-reply {
  margin-top: 8px; padding: 8px 12px;
  background: rgba(201,162,39,0.06); border-left: 3px solid var(--gold);
  border-radius: 0 6px 6px 0; font-size: 12px; color: var(--gold);
}

/* RULE PDF VIEWER */
.rule-pdf-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; padding: 4px 12px; border-radius: 10px;
  background: rgba(231,76,60,0.1); color: #e74c3c;
  border: 1px solid rgba(231,76,60,0.3); cursor: pointer;
  transition: all 0.2s; text-decoration: none; font-weight: 600;
}
.rule-pdf-badge:hover { background: rgba(231,76,60,0.2); }
.rule-title-badge {
  font-family: 'Cinzel',serif; font-size: 11px; color: var(--gold);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
}

/* USER SEARCH */
.user-search-wrap {
  margin-bottom: 16px;
}

/* ANIMATIONS */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes fadeInDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* RESPONSIVE */
/* Hamburger - nascosto su desktop */
.hamburger-btn { display:none; }
.sidebar-overlay { display:none; }

/* MacBook / laptop (1024px+): centra il contenuto con max-width */
@media(min-width:769px) {
  .content { padding: 28px max(28px, calc((100% - 1080px) / 2)); }
}

/* Banner PWA install */
#pwa-banner {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--bg2); border:1px solid var(--border-gold);
  border-radius:12px; padding:14px 20px;
  display:flex; align-items:center; gap:14px;
  box-shadow:0 4px 24px rgba(0,0,0,0.6);
  z-index:9999; max-width:480px; width:calc(100% - 40px);
  animation:slideUp 0.4s ease;
}
#pwa-banner .pwa-icon { font-size:28px; flex-shrink:0; }
#pwa-banner .pwa-text { flex:1; }
#pwa-banner .pwa-text strong { display:block; font-size:13px; color:var(--text); letter-spacing:1px; }
#pwa-banner .pwa-text span { font-size:11px; color:var(--text-muted); line-height:1.5; }
#pwa-banner .pwa-actions { display:flex; gap:8px; flex-shrink:0; }
#pwa-banner .pwa-install-btn {
  padding:7px 16px; background:linear-gradient(135deg,var(--gold-dark),var(--gold));
  color:#000; border:none; border-radius:6px;
  font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap;
}
#pwa-banner .pwa-dismiss { background:none; border:none; color:var(--text-muted); font-size:18px; cursor:pointer; padding:4px; }

@media(max-width:768px) {
  /* Hamburger button */
  .hamburger-btn {
    display:flex; flex-direction:column; justify-content:center;
    gap:5px; cursor:pointer; padding:6px; background:none;
    border:none; margin-right:4px;
  }
  .hamburger-btn span {
    display:block; width:22px; height:2px;
    background:var(--gold); border-radius:2px;
    transition:all 0.3s;
  }
  /* Overlay scuro dietro sidebar */
  .sidebar-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.6); z-index:99;
  }
  .sidebar-overlay.open { display:block; }
  /* Sidebar come drawer da sinistra */
  .sidebar {
    position:fixed; top:60px; left:-240px;
    height:calc(100vh - 60px); z-index:100;
    width:220px; transition:left 0.3s ease;
    overflow-y:auto;
  }
  .sidebar.open { left:0; }
  /* Adattamenti layout */
  .form-grid { grid-template-columns:1fr; }
  .stats-grid { grid-template-columns:1fr 1fr; }
  .doc-grid { grid-template-columns:repeat(2,1fr); }
  .topbar-title { display:none; }
  .content { padding:16px; }
}
</style>
</head>

<script>
// ===== AUDIO SYSTEM =====
const _audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playClick() {
  try {
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain); gain.connect(_audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, _audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, _audioCtx.currentTime + 0.04);
    gain.gain.setValueAtTime(0.18, _audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.04);
    osc.start(_audioCtx.currentTime);
    osc.stop(_audioCtx.currentTime + 0.05);
  } catch(e) {}
}

function playSwoosh() {
  try {
    const bufSize = _audioCtx.sampleRate * 0.35;
    const buf = _audioCtx.createBuffer(1, bufSize, _audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
    const src = _audioCtx.createBufferSource();
    src.buffer = buf;
    const filter = _audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(400, _audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(3000, _audioCtx.currentTime + 0.15);
    filter.Q.value = 1.5;
    const gain = _audioCtx.createGain();
    gain.gain.setValueAtTime(0.001, _audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.3, _audioCtx.currentTime + 0.08);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.35);
    src.connect(filter); filter.connect(gain); gain.connect(_audioCtx.destination);
    src.start(_audioCtx.currentTime);
    src.stop(_audioCtx.currentTime + 0.36);
  } catch(e) {}
}

// Helper API
let authToken = null;
async function apiFetch(path, opts = {}) {
  const res = await fetch('/api' + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(authToken ? { 'Authorization': 'Bearer ' + authToken } : {}),
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return res.json();
}

function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0;
    return (c=='x'?r:(r&0x3|0x8)).toString(16);
  });
}
function fmt(d) {

    {pct:40, txt:'Verifica credenziali...'},
    {pct:75, txt:'Caricamento profilo...'},
    {pct:100, txt:'Benvenuto in AD Security'}

async function submitPasswordReset() {
  const nome = document.getElementById('pr-nome').value.trim();
  const cognome = document.getElementById('pr-cognome').value.trim();
  const pw = document.getElementById('pr-newpw').value;
  const errEl = document.getElementById('pr-err');
  const okEl = document.getElementById('pr-ok');
  errEl.style.display = 'none';
  if(!nome || !cognome || !pw) { errEl.textContent = 'Compila tutti i campi.'; errEl.style.display='block'; return; }
  if(pw.length < 4) { errEl.textContent = 'Password troppo corta (min 4 caratteri).'; errEl.style.display='block'; return; }
  try {
    await fetch('/api/password-reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, cognome, nuova_password_richiesta: pw })
    });
    // Suono fruscio via Web Audio API
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.35, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i = 0; i < data.length; i++) {
        const t = i / ctx.sampleRate;
        const env = Math.exp(-t * 9);
        data[i] = (Math.random() * 2 - 1) * env * 0.4 + Math.sin(2 * Math.PI * 440 * t * (1 - t * 2.5)) * env * 0.3;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(ctx.destination);
      src.start();
    } catch(e) {}
    // Effetto visivo: overlay verde con checkmark
    const overlay = document.getElementById('pw-reset-overlay');
    const inner = overlay.querySelector('div');
    inner.style.transition = 'all 0.35s ease';
    inner.style.transform = 'scale(1.04)';
    inner.style.borderColor = 'rgba(46,204,113,0.7)';
    inner.style.boxShadow = '0 0 32px rgba(46,204,113,0.35)';
    setTimeout(() => { inner.style.transform = 'scale(1)'; }, 350);
    okEl.style.display = 'block';
    okEl.style.animation = 'none';
    okEl.style.fontSize = '14px';
    okEl.style.padding = '14px';
    okEl.style.textAlign = 'center';
    okEl.innerHTML = '<div style="font-size:2.5rem;margin-bottom:8px">✅</div>Richiesta inviata!<br><span style="font-size:11px;opacity:0.8">Attendi che l\'admin aggiorni la tua password.</span>';
    document.getElementById('pr-nome').disabled = true;
    document.getElementById('pr-cognome').disabled = true;
    document.getElementById('pr-newpw').disabled = true;
    const btn = document.querySelector('#pw-reset-overlay button.btn-gold');
    btn.disabled = true;
    btn.textContent = '✓ Inviata';
    btn.style.background = 'rgba(46,204,113,0.3)';
    btn.style.color = '#2ecc71';
    btn.style.borderColor = 'rgba(46,204,113,0.5)';
  } catch(e) {
    errEl.textContent = 'Errore invio richiesta. Riprova.';
    errEl.style.display = 'block';
  }
}

    // Se il browser ha già il permesso E il player_id è salvato nel DB → silent
    if (Notification.permission === 'granted' && currentUser?.has_push) {

        <div style="font-size:14px;color:#ccc;line-height:1.6;margin-bottom:28px;">Per ricevere messaggi urgenti e comunicazioni dell'amministratore devi attivare le notifiche push.</div>
        <button onclick="enablePushNotifications()" style="width:100%;background:linear-gradient(135deg,#a07818,#c9a227);color:#000;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;">Attiva Notifiche</button>
      </div>`;
    document.body.appendChild(overlay);
  } catch(e) { console.log('OneSignal init error:', e.message); }
}

async function _oneSignalInitSilent() {
  try {
    if (!window.OneSignalDeferred) return;
    const cfg = await apiFetch('/config');
    if (!cfg || !cfg.onesignal_app_id) return;
    window.OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({ appId: cfg.onesignal_app_id, notifyButton: { enable: false }, serviceWorkerPath: '/sw.js', serviceWorkerUpdaterPath: '/sw.js' });
      const playerId = OneSignal.User.PushSubscription.id;
      if (playerId) {
        await apiFetch('/push-token', { method: 'POST', body: JSON.stringify({ player_id: playerId }) });
        console.log('OneSignal: player_id salvato', playerId);
      }
    });
  } catch(e) {}
}

async function enablePushNotifications() {
  try {
    document.getElementById('push-banner')?.remove();
    // Chiama requestPermission direttamente nel gesto utente (senza await asincroni prima)
    const permission = await Notification.requestPermission();
    console.log('Permesso notifiche:', permission);
    if (permission !== 'granted') return;
    // Ora init OneSignal per ottenere il player_id
    if (!window.OneSignalDeferred) return;
    const cfg = await apiFetch('/config');
    if (!cfg || !cfg.onesignal_app_id) return;
    window.OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({ appId: cfg.onesignal_app_id, notifyButton: { enable: false }, serviceWorkerPath: '/sw.js', serviceWorkerUpdaterPath: '/sw.js' });
      // Aspetta che la subscription sia pronta
      await new Promise(r => setTimeout(r, 2000));
      const pid = OneSignal.User.PushSubscription.id;
      console.log('Player ID:', pid);
      if (pid) {
        await apiFetch('/push-token', { method: 'POST', body: JSON.stringify({ player_id: pid }) });
        console.log('Player ID salvato');
      } else {
        OneSignal.User.PushSubscription.addEventListener('change', async () => {
          const p = OneSignal.User.PushSubscription.id;
          if (p) await apiFetch('/push-token', { method: 'POST', body: JSON.stringify({ player_id: p }) });
        });
      }
    });
  } catch(e) { console.log('Push enable error:', e.message); }
}

function formatCountdown(expires_at) {
  const diff = new Date(expires_at) - new Date();
  if(diff <= 0) return 'Scaduto';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if(h > 0) return `${h}h ${m}m rimanenti`;
  return `${m} minuti rimanenti`;
}

async function sendUrgentMessage() {
  const testo = document.getElementById('urgent-text').value.trim();
  const hours = parseFloat(document.getElementById('urgent-duration').value);
  if(!testo) { showToast('Scrivi il messaggio urgente', 'error'); return; }
  const now = new Date();
  const expires = new Date(now.getTime() + hours * 3600000);
  try {
    await apiFetch('/urgent-messages', { method:'POST', body: JSON.stringify({testo, expires_at: expires.toISOString(), duration_hours: hours}) });
    document.getElementById('urgent-text').value = '';
    showToast('Messaggio urgente pubblicato ✓');
    renderAdminComms(document.getElementById('content'));
  } catch(e) { showToast('Errore', 'error'); }
}

async function fileToBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function sendBroadcast() {
  const testo = document.getElementById('broad-text').value.trim();
  const fileEl = document.getElementById('broad-file');
  if(!testo && !fileEl.files[0]) { showToast('Scrivi un messaggio o allega un file','error'); return; }
  let file_data=null, nome_file=null, mime_type=null;
  if(fileEl.files[0]) {
    const f = fileEl.files[0];
    if(f.size > 1048576) { showToast('File troppo grande (max 500KB)','error'); return; }
    file_data = await fileToBase64(f);
    nome_file = f.name; mime_type = f.type;
  }
  try {
    await apiFetch('/messages', { method:'POST', body: JSON.stringify({testo, is_broadcast: true, file_data, nome_file, mime_type}) });
    document.getElementById('broad-text').value='';
    fileEl.value='';
    playSwoosh();
    showToast('Messaggio inviato a tutti gli operatori ✓');
    renderAdminComms(document.getElementById('content'));
  } catch(e) { showToast('Errore invio', 'error'); }
}

async function getUserUnreadCount() {
  const u = currentUser;
  try {
    const msgs = await apiFetch('/messages');
    return msgs.filter(m => {
      if(!m.is_broadcast && m.target_user_id !== u.id) return false;
      return !m.read_by?.includes(u.id);
    }).length;
  } catch(e) { return 0; }
}

function showUserPage(page, el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  const content = document.getElementById('content');
  if(page==='dashboard') renderUserDashboard(content);
  else if(page==='profile') renderUserProfile(content);
  else if(page==='documents') renderUserDocuments(content);
  else if(page==='expenses') renderUserExpenses(content);
  else if(page==='messages') renderUserMessages(content);
  else if(page==='info') renderUserInfo(content);
  else if(page==='rules') renderUserRules(content);
  else if(page==='notes') renderUserNotes(content);
  else if(page==='vestiario') renderUserVestiario(content);
}

async function myTesseraPrint(userId) {
  try {
    const [user, docs] = await Promise.all([
      apiFetch(`/users/${userId}`),
      apiFetch(`/documents/${userId}`)
    ]);
    const fotoData = docs.foto_selfie ? docs.foto_selfie.data : null;
    const fotoMime = docs.foto_selfie ? docs.foto_selfie.mime_type : null;
    const htmlFronte = buildTesseraHtml(user, fotoData, fotoMime, 'fronte');
    const htmlRetro  = buildTesseraHtml(user, fotoData, fotoMime, 'retro');
    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head><title>Tessera ASC - ${user.nome||''} ${user.cognome||''}</title>
      <style>body{margin:20px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:24px;font-family:Arial}
      h3{color:#333;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin:0}
      @media print{h3{display:none}}</style></head>
      <body onload="window.print()">
        <h3>FRONTE</h3>${htmlFronte}
        <h3 style="margin-top:16px">RETRO</h3>${htmlRetro}
      </body></html>`);
    win.document.close();
  } catch(e) { showToast('Errore stampa', 'error'); }
}

async function saveProfile(manual = false) {
  clearTimeout(_profileAutosaveTimer);
  const nome          = document.getElementById('p-nome')?.value || '';
  const cognome       = document.getElementById('p-cognome')?.value || '';
  const telefono      = document.getElementById('p-tel')?.value || '';
  const codice_fiscale= document.getElementById('p-cf')?.value || '';
  const indirizzo     = document.getElementById('p-ind')?.value || '';
  const data_nascita  = document.getElementById('p-dn')?.value || '';
  const iban          = document.getElementById('p-iban')?.value || '';
  const nr_matricola  = document.getElementById('p-matricola')?.value || '';
  const matricola_rilasciata = document.getElementById('p-mat-rilasciata')?.value || '';
  const matricola_scadenza   = document.getElementById('p-mat-scadenza')?.value || '';
  try {
    const updated = await apiFetch(`/users/${currentUser.id}`, {
      method:'PUT',
      body: JSON.stringify({ nome, cognome, email: currentUser.email, telefono, indirizzo, data_nascita: data_nascita||null, codice_fiscale, iban: iban||null, nr_matricola: nr_matricola||null, matricola_rilasciata: matricola_rilasciata||null, matricola_scadenza: matricola_scadenza||null })
    });
    currentUser = {...currentUser, ...updated};
    const statusEl = document.getElementById('profile-save-status');
    if(statusEl) { statusEl.style.display='block'; statusEl.style.color='#2ecc71'; statusEl.textContent='✓ Salvato'; }

    const statusEl = document.getElementById('profile-save-status');

    if(manual) showToast('Errore aggiornamento', 'error');
  }
}

async function openUtilityModal() {
  openModal(`
    <div class="modal-title">
      <span>⚙ Utility — Database</span>

    </div>

  try {
    const stats = await apiFetch('/admin/db-stats');
    const totalBytes = stats.total.total_bytes;
    const totalMB = (totalBytes / 1048576).toFixed(2);
    const totalKB = (totalBytes / 1024).toFixed(0);
    const totalRows = stats.tables.reduce((s,t) => s + Number(t.rows), 0);
    const maxBytes = Math.max(...stats.tables.map(t => Number(t.size_bytes)), 1);
    const colors = ['#c9a227','#3498db','#2ecc71','#e67e22','#9b59b6','#e74c3c','#1abc9c','#f39c12','#16a085','#d35400'];

    document.getElementById('utility-body').innerHTML = `

          <div class="val">${totalMB}</div>
          <div class="lbl">🗄️ MB Totali</div>
        </div>
        <div class="db-stat-card">
          <div class="val">${stats.tables.length}</div>
          <div class="lbl">📋 Tabelle</div>
        </div>
        <div class="db-stat-card">
          <div class="val">${totalRows.toLocaleString()}</div>
          <div class="lbl">📝 Righe Totali</div>
        </div>
      </div>

      <div style="font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border-gold)">
        📊 Utilizzo per Tabella
      </div>

      ${stats.tables.map((t, i) => {
        const mb = (Number(t.size_bytes) / 1048576).toFixed(3);
        const kb = (Number(t.size_bytes) / 1024).toFixed(1);
        const pct = Math.max(3, Math.round((Number(t.size_bytes) / maxBytes) * 100));
        const col = colors[i % colors.length];
        const rows = Number(t.rows).toLocaleString();
        const pctOfTotal = totalBytes > 0 ? ((Number(t.size_bytes) / totalBytes) * 100).toFixed(1) : 0;
        return `
        <div class="db-table-row">
          <div class="db-table-row-top">
            <span class="db-table-name" style="color:${col}">● ${t.tablename}</span>
            <div style="display:flex;gap:20px;align-items:baseline">
              <span class="db-table-mb" style="color:${col}">${mb} MB</span>
              <span class="db-table-meta">${rows} righe</span>
              <span class="db-table-meta" style="min-width:36px;text-align:right">${pctOfTotal}%</span>

          </div>
          <div class="db-bar-track">
            <div class="db-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${col}60,${col})"></div>
          </div>

      <div style="text-align:center;color:var(--text-muted);font-size:11px;margin:16px 0 4px">

// ===== GESTIONE UTENTI =====
async function renderAdminGestioneUtenti(content, searchQ) {
  try {
    const [users, pwResets] = await Promise.all([
      apiFetch('/users'),
      apiFetch('/password-reset')
    ]);
    const pwPendingMap = {};
    pwResets.filter(r => r.stato === 'in_attesa').forEach(r => {
      if(r.user_id) pwPendingMap[r.user_id] = r;
    });
    // Fallback: match per nome+cognome se user_id è null
    const pwPendingByName = {};
    pwResets.filter(r => r.stato === 'in_attesa' && !r.user_id).forEach(r => {
      pwPendingByName[`${r.nome}|${r.cognome}`.toLowerCase()] = r;
    });
    const q = (searchQ || '').toLowerCase();
    const filtered = q
      ? users.filter(u => `${u.nome||''} ${u.cognome||''} ${u.email}`.toLowerCase().includes(q))
      : users;

    content.innerHTML = `
      <div class="card">
        <div class="card-title">🔐 Gestione Utenti</div>
        <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
          <div style="flex:1;min-width:220px;position:relative">
            <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:13px;pointer-events:none">🔍</span>
            <input class="field-input" style="padding-left:32px;width:100%;box-sizing:border-box"
              placeholder="Cerca per nome, cognome o email..."
              value="${searchQ||''}"
              oninput="renderAdminGestioneUtenti(document.getElementById('content'), this.value)">
          </div>
          <div style="display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:12px">
            <span>${filtered.length} utenti trovati</span>
            ${q ? `<button class="btn-sm btn-secondary" onclick="renderAdminGestioneUtenti(document.getElementById('content'),'')">✕ Reset</button>` : ''}
          </div>
        </div>

        ${filtered.length === 0
          ? '<div style="color:var(--text-muted);font-size:13px;padding:20px 0;text-align:center">Nessun utente trovato</div>'
          : `<div style="overflow-x:auto">
            <table class="gu-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Email</th>
                  <th>Registrato</th>
                  <th>Stato</th>
                  <th>Azioni</th>
                </tr>
              </thead>
              <tbody>
                ${filtered.map(u => `
                  <tr>
                    <td>
                      <strong>${u.nome||'—'} ${u.cognome||''}</strong>
                      ${(pwPendingMap[u.id] || pwPendingByName[`${u.nome||''}|${u.cognome||''}`.toLowerCase()]) ? `<span onclick="guShowPwRequest('${u.id}')" title="Richiesta password in sospeso" style="cursor:pointer;margin-left:6px;font-size:13px;background:rgba(231,76,60,0.2);color:#e74c3c;border:1px solid rgba(231,76,60,0.4);padding:1px 6px;border-radius:6px">🔑 Richiesta pw</span>` : ''}
                    </td>
                    <td style="color:var(--text-muted)">${u.email}</td>
                    <td style="color:var(--text-muted);font-size:11px">${fmtDate(u.created_at)}</td>
                    <td>
                      <span class="gu-badge ${u.blocked ? 'bloccato' : 'attivo'}">
                        ${u.blocked ? '🔒 BLOCCATO' : '✅ ATTIVO'}
                      </span>
                    </td>
                    <td>
                      <div class="gu-actions">
                        <button class="btn-sm btn-secondary" onclick="guPasswordModal('${u.id}','${(u.nome||u.email).replace(/'/g,'')}')" title="Cambia password">🔑 Password</button>
                        ${u.blocked
                          ? `<button class="btn-sm" style="background:rgba(46,204,113,0.15);color:#2ecc71;border:1px solid rgba(46,204,113,0.3)" onclick="guUnblock('${u.id}')">🔓 Sblocca</button>`
                          : `<button class="btn-sm btn-danger" onclick="guBlock('${u.id}')">🔒 Blocca</button>`
                        }
                        <button class="btn-sm btn-danger" onclick="guDelete('${u.id}','${(u.nome||u.email).replace(/'/g,'')}')">🗑 Elimina</button>
                      </div>
                    </td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>`
        }
      </div>`;
  } catch(e) {
    content.innerHTML = '<div class="card" style="color:#e74c3c">Errore caricamento utenti</div>';
  }
}

async function downloadDbBackup() {
  try {
    showToast('Generazione backup in corso...');
    const res = await fetch('/api/admin/db-backup', {
      headers: { Authorization: 'Bearer ' + authToken }
    });
    if(!res.ok) throw new Error();
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `adsecurity-backup-${new Date().toISOString().substring(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Backup scaricato ✓');
  } catch(e) { showToast('Errore backup', 'error'); }
}

// ===== STAMPA SCHEDA OPERATORE PDF =====
async function adminPrintUser(id) {
  showToast('Generazione PDF in corso...');
  try {
    const [u, docs] = await Promise.all([apiFetch(`/users/${id}`), apiFetch(`/documents/${id}`)]);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = 210, H = 297;
    const now = new Date().toLocaleDateString('it-IT', { day:'2-digit', month:'long', year:'numeric' });
    const nomeCognome = `${u.nome||''} ${u.cognome||''}`.trim() || u.email;

    // Sfondo bianco
    doc.setFillColor(255, 255, 255);
    doc.rect(0, 0, W, H, 'F');

    // Header band grigio chiaro
    doc.setFillColor(245, 245, 245);
    doc.rect(0, 0, W, 40, 'F');
    doc.setDrawColor(180, 180, 180);
    doc.setLineWidth(0.5);
    doc.line(0, 40, W, 40);

    // Monogramma AD
    doc.setFillColor(40, 40, 40);
    doc.roundedRect(12, 7, 26, 26, 2, 2, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(13); doc.setFont('helvetica', 'bold');
    doc.text('AD', 25, 23, { align: 'center' });

    // Titolo header
    doc.setTextColor(30, 30, 30);
    doc.setFontSize(15); doc.setFont('helvetica', 'bold');
    doc.text('ALFA SECURITY', 46, 17);
    doc.setFontSize(8.5); doc.setFont('helvetica', 'normal');
    doc.setTextColor(100, 100, 100);
    doc.text('Sistema Professionale Gestione Operatori', 46, 24);
    doc.text(`Documento generato il ${now}`, 46, 31);

    // Titolo scheda
    doc.setFillColor(40, 40, 40);
    doc.rect(0, 42, W, 16, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(13); doc.setFont('helvetica', 'bold');
    doc.text('SCHEDA OPERATORE', W/2, 52, { align: 'center' });
    doc.setFontSize(9); doc.setFont('helvetica', 'normal');
    doc.setTextColor(210, 210, 210);
    doc.text(nomeCognome.toUpperCase(), W/2, 57, { align: 'center' });

    // Dati
    let y = 68;
    const addSection = (title) => {
      if(y > 265) { doc.addPage(); doc.setFillColor(255,255,255); doc.rect(0,0,W,H,'F'); y = 15; }
      doc.setFillColor(230, 230, 230);
      doc.rect(10, y, W-20, 7, 'F');
      doc.setDrawColor(150, 150, 150); doc.setLineWidth(0.3);
      doc.line(10, y+7, W-10, y+7);
      doc.setTextColor(40, 40, 40); doc.setFontSize(8); doc.setFont('helvetica', 'bold');
      doc.text(title.toUpperCase(), 14, y+5);
      y += 10;
    };
    const addRow = (label, value, bold) => {
      if(y > 270) { doc.addPage(); doc.setFillColor(255,255,255); doc.rect(0,0,W,H,'F'); y = 15; }
      doc.setTextColor(110, 110, 110); doc.setFontSize(8); doc.setFont('helvetica', 'normal');
      doc.text(label + ':', 14, y);
      doc.setTextColor(30, 30, 30); doc.setFont('helvetica', bold ? 'bold' : 'normal');
      doc.text(value || '—', 65, y);
      doc.setDrawColor(220, 220, 220); doc.setLineWidth(0.2);
      doc.line(10, y+2, W-10, y+2);
      y += 7;
    };

    addSection('Dati Anagrafici');
    addRow('Nome', u.nome); addRow('Cognome', u.cognome);
    addRow('Email', u.email); addRow('Telefono', u.telefono);
    addRow('Indirizzo', u.indirizzo);
    addRow('Data di Nascita', u.data_nascita ? u.data_nascita.substring(0,10) : null);
    addRow('Codice Fiscale', u.codice_fiscale);
    addRow('IBAN', u.iban);
    y += 3;

    addSection('Matricola ASC');
    addRow('Nr. Matricola', u.nr_matricola, true);
    addRow('Data Rilasciata', u.matricola_rilasciata ? u.matricola_rilasciata.substring(0,10) : null);
    addRow('Data Scadenza', u.matricola_scadenza ? u.matricola_scadenza.substring(0,10) : null, true);
    y += 3;

    addSection('Privacy');
    addRow('Disclaimer Accettato', u.disclaimer_accepted ? `Si — ${u.disclaimer_accepted_at ? new Date(u.disclaimer_accepted_at).toLocaleDateString('it-IT') : ''}` : 'No');
    addRow('Registrato il', new Date(u.created_at).toLocaleDateString('it-IT'));
    y += 5;

    // Documenti / Foto
    const docLabels = {
      foto_selfie:'Foto Selfie', carta_identita:"Carta d'Identita",
      codice_fiscale_doc:'Codice Fiscale', permesso_soggiorno:'Permesso Soggiorno',
      attestato_vvff:'Attestato VVFF', attestato_asc:'Attestato ASC',
      istanza_questura:'Istanza Questura', tesserino_asc:'Tesserino ASC'
    };
    const imgDocs = Object.entries(docLabels).filter(([k]) => docs[k] && docs[k].mime_type && docs[k].mime_type.startsWith('image/'));
    if(imgDocs.length > 0) {
      addSection('Documenti Allegati');
      const imgW = 85, imgH = 62, gap = 10;
      let col = 0;
      for(const [k, label] of imgDocs) {
        const d = docs[k];
        if(y + imgH + 16 > 275) { doc.addPage(); doc.setFillColor(255,255,255); doc.rect(0,0,W,H,'F'); y = 15; col = 0; }
        const x = 10 + col * (imgW + gap);
        doc.setDrawColor(180, 180, 180); doc.setLineWidth(0.4);
        doc.rect(x, y, imgW, imgH);
        try { doc.addImage(d.data, d.mime_type.includes('png') ? 'PNG' : 'JPEG', x+1, y+1, imgW-2, imgH-2, undefined, 'FAST'); } catch(e) {}
        doc.setTextColor(80, 80, 80); doc.setFontSize(7); doc.setFont('helvetica', 'normal');
        doc.text(label, x + imgW/2, y + imgH + 5, { align: 'center' });
        col++;
        if(col >= 2) { col = 0; y += imgH + 14; }
      }
      if(col > 0) y += imgH + 14;
    }

    // Footer
    const pages = doc.internal.getNumberOfPages();
    for(let i = 1; i <= pages; i++) {
      doc.setPage(i);
      doc.setDrawColor(180, 180, 180); doc.setLineWidth(0.3);
      doc.line(10, H-14, W-10, H-14);
      doc.setTextColor(140, 140, 140); doc.setFontSize(7); doc.setFont('helvetica', 'normal');
      doc.text('Alfa Security — Documento riservato ad uso interno', 14, H-9);
      doc.text(`Pag. ${i} / ${pages}`, W-14, H-9, { align: 'right' });
    }

    doc.save(`Scheda operatore ${nomeCognome}.pdf`);
    showToast('PDF scaricato ✓');
  } catch(e) { showToast('Errore generazione PDF', 'error'); console.error(e); }
}

function renderDocSlot(d, docs) {
  docs = docs || {};
  const doc = docs[d.k];
  const isImg = doc && doc.mime_type && doc.mime_type.startsWith('image/');
  if(doc) {
    return `
      <div class="doc-slot filled">
        ${isImg ? `<img src="${doc.data}" class="doc-preview">` : `<div class="doc-icon">📄</div>`}
        <div class="doc-name">${d.label}</div>
        <span class="doc-badge badge-uploaded">✓ Caricato</span>
        <div class="doc-date">${fmtDate(doc.date)}</div>
        <div class="doc-actions">
          <button class="doc-btn btn-secondary" style="font-size:10px" onclick="triggerDocUpload('${d.k}')">🔄</button>
          <button class="doc-btn btn-danger" style="font-size:10px" onclick="deleteDoc('${d.k}')">🗑</button>
          <a href="${doc.data}" download="${doc.nome_file}" style="text-decoration:none">
            <button class="doc-btn btn-secondary" style="font-size:10px">⬇</button>
          </a>
        </div>
        <input type="file" id="file-${d.k}" class="doc-upload-input" accept=".jpg,.jpeg,.png,.pdf" onchange="handleDocUpload('${d.k}',this)">
      </div>`;
  } else {
    return `
      <div class="doc-slot ${d.required?'required':''}" onclick="triggerDocUpload('${d.k}')">
        <div class="doc-icon">${d.icon}</div>
        <div class="doc-name">${d.label}</div>
        <span class="doc-badge ${d.required?'badge-required':'badge-optional'}">${d.required?'Obbligatorio':'Facoltativo'}</span>
        <div style="font-size:11px;color:var(--text-muted);margin-top:8px">+ Carica</div>
        <input type="file" id="file-${d.k}" class="doc-upload-input" accept=".jpg,.jpeg,.png,.pdf" onchange="handleDocUpload('${d.k}',this)">
      </div>`;
  }
}

function triggerDocUpload(k) {
  document.getElementById('file-'+k).click();
}

async function handleDocUpload(k, el) {
  const f = el.files[0];
  if(!f) return;
  const errEl = document.getElementById('doc-error');
  const allowed = ['image/jpeg','image/png','application/pdf'];
  if(!allowed.includes(f.type)) {
    errEl.textContent = '⚠️ Formato non supportato. Usa JPG, PNG o PDF.';
    errEl.classList.add('show'); el.value=''; return;
  }
  if(f.size > 1048576) {
    errEl.innerHTML = `❌ <strong>Cambia risoluzione alla tua foto, questa è troppo grande (max 1MB)!</strong><br>
    Ti consigliamo di trasformarla in file PDF oppure di modificare il setup del tuo smartphone e riprovare.`;
    errEl.classList.add('show'); el.value=''; return;
  }
  errEl.classList.remove('show');
  const file_data = await fileToBase64(f);
  const nome_file = f.name;
  const mime_type = f.type;
  try {
    await apiFetch(`/documents/${currentUser.id}`, {
      method:'POST',
      body: JSON.stringify({ doc_key: k, nome_file, mime_type, file_data })
    });
    renderUserDocuments(document.getElementById('content'));
    showToast('Documento caricato ✓');
  } catch(e) { showToast('Errore caricamento documento', 'error'); }
}

function deleteDoc(k) {

}
