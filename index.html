              ${!f.messaggio_inviato?`<button onclick="_vesaPFInvia('${f.id}')" style="padding:4px 9px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.4);border-radius:6px;color:#10b981;cursor:pointer;font-size:11px;font-weight:600">📨 Invia</button>`:''}
            </div></td>
          </tr>`).join('')}</tbody>
        </table></div>`}
    </div>
  </div>`;
}

async function _vesaLoadPF() {
  try {
    const [users, data] = await Promise.all([
      apiFetch('/users'),
      apiFetch('/admin/prime-forniture')
    ]);
    window._VESAPF.users = users;
    window._VESAPF.data = data;
    window._VESAPF.loaded = true;
    if (window._VESA.tab === 'prima_fornitura') _vesaRender(document.getElementById('content'));
  } catch(e) { showToast('Errore caricamento dati fornitura','error'); }
}

async function _vesaPFSalva() {
  const opId = document.getElementById('pf_op')?.value;
  if (!opId) { showToast('Seleziona un operatore','error'); return; }
  const body = {
    operatore_id: opId,
    giacca: parseInt(document.getElementById('pf_giacca')?.value)||0,
    maglietta: parseInt(document.getElementById('pf_maglietta')?.value)||0,
    pantaloni: parseInt(document.getElementById('pf_pantaloni')?.value)||0,
    felpa: parseInt(document.getElementById('pf_felpa')?.value)||0,
    radio: parseInt(document.getElementById('pf_radio')?.value)||0,
    note: document.getElementById('pf_note')?.value||null
  };
  const totale = body.giacca+body.maglietta+body.pantaloni+body.felpa+body.radio;
  if (totale===0) { showToast('Inserisci almeno un articolo','error'); return; }
  try {
    const r = await apiFetch('/admin/prime-forniture',{method:'POST',body:JSON.stringify(body)});
    window._VESAPF.data.unshift(r);
    showToast('✓ Fornitura salvata');
    _vesaRender(document.getElementById('content'));
  } catch(e) { showToast('Errore salvataggio','error'); }
}

function _vesaPFSearch(v) {
  window._VESAPF.search = v;
  _vesaRender(document.getElementById('content'));
  const inp = document.getElementById('pf_search');
  if(inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

function _vesaPFPDF(id) {
  const f = window._VESAPF.data.find(x=>x.id===id); if(!f) return;
  const {jsPDF} = window.jspdf; if(!jsPDF){showToast('Libreria PDF non disponibile','error');return;}
  const doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210, M=20; let y=M;
  // Header
  doc.setFillColor(10,10,10); doc.rect(0,0,W,32,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(201,162,39);
  doc.text('ALFA SECURITY GROUP', M, 13);
  doc.setFontSize(11); doc.setTextColor(220,220,220);
  doc.text('FORNITURA VESTIARIO SECURITY', M, 22);
  doc.setFontSize(8); doc.setTextColor(150,150,150);
  const dataStr = new Date(f.data_fornitura).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  const oraStr = new Date(f.data_fornitura).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  doc.text('Data: '+dataStr+' '+oraStr, W-M, 22, {align:'right'});
  y = 44;
  // Operatore
  doc.setFillColor(245,245,245); doc.rect(M,y-5,W-M*2,18,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(30,30,30);
  doc.text('OPERATORE:', M+4, y+2);
  doc.setFont('helvetica','normal'); doc.setFontSize(12);
  doc.text((f.nome_operatore||'')+' '+(f.cognome_operatore||''), M+36, y+2);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(100,100,100);
  doc.text('Responsabile: '+f.admin_nome, M+4, y+9);
  y += 22;
  // Separatore
  doc.setDrawColor(201,162,39); doc.setLineWidth(0.5); doc.line(M,y,W-M,y); y+=8;
  // Titolo tabella
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(50,50,50);
  doc.text('RIEPILOGO ARTICOLI FORNITI', M, y); y+=8;
  // Tabella
  const CAPI_PDF=[{k:'giacca',l:'Giacca Security'},{k:'maglietta',l:'Maglietta Security'},{k:'pantaloni',l:'Pantaloni Security'},{k:'felpa',l:'Felpa Security'},{k:'radio',l:'Radio'}];
  doc.setFillColor(201,162,39); doc.rect(M,y,W-M*2,8,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(0,0,0);
  doc.text('Articolo',M+4,y+5.5); doc.text('Quantità',W-M-20,y+5.5,{align:'right'}); y+=10;
  CAPI_PDF.forEach((c,i)=>{
    const qty = f[c.k]||0;
    if(i%2===0){doc.setFillColor(248,248,248); doc.rect(M,y-1,W-M*2,9,'F');}
    doc.setFont('helvetica',qty>0?'bold':'normal');
    doc.setFontSize(10); doc.setTextColor(qty>0?30:130,qty>0?30:130,qty>0?30:130);
    doc.text(c.l, M+4, y+5.5);
    doc.text(qty>0?String(qty)+' pz':'—', W-M-4, y+5.5, {align:'right'});
    y+=9;
  });
  y+=6;
  // Note
  if(f.note){
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(80,80,80);
    doc.text('Note: '+f.note, M, y); y+=10;
  }
  // Separatore
  doc.setDrawColor(200,200,200); doc.setLineWidth(0.3); doc.line(M,y,W-M,y); y+=10;
  // Testo legale
  doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(60,60,60);
  const legalLines = doc.splitTextToSize('Fornitura abbigliamento security in concordato col regolamento aziendale da Lei sottoscritto.', W-M*2);
  doc.text(legalLines, M, y); y += legalLines.length*5+10;
  // Firma
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(80,80,80);
  doc.text('Firma operatore: ___________________________', M, y);
  doc.text('Data: _______________', W-M-50, y);
  y+=14;
  doc.text('Firma responsabile: ___________________________', M, y);
  // Footer
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(160,160,160);
  doc.text('Alfa Security Group — Fornitura Vestiario Security — '+dataStr, W/2, 290, {align:'center'});
  doc.save('fornitura_'+((f.cognome_operatore||'op').toLowerCase())+'_'+dataStr.replace(/\//g,'-')+'.pdf');
}

async function _vesaPFInvia(id) {
  if(!confirm('Inviare la fornitura al lato utente dell\'operatore?')) return;
  try {
    await apiFetch('/admin/prime-forniture/'+id+'/invia',{method:'POST',body:JSON.stringify({})});
    const f = window._VESAPF.data.find(x=>x.id===id);
    if(f){ f.messaggio_inviato=true; f.messaggio_inviato_at=new Date().toISOString(); }
    showToast('✓ Messaggio inviato all\'operatore');
    _vesaRender(document.getElementById('content'));
  } catch(e){ showToast('Errore invio','error'); }
}
function _vesaSetSearch(v){window._VESA.search=v;_vesaRender(document.getElementById('content'));const inp=document.getElementById('vesa_search');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}}
function _vesaSetStato(v){window._VESA.stato=v;_vesaRender(document.getElementById('content'));}
function _vesaFiltroRapido(v){window._VESA.stato=window._VESA.stato===v?'tutti':v;_vesaRender(document.getElementById('content'));}
function _vesaReset(){window._VESA.search='';window._VESA.stato='tutti';_vesaRender(document.getElementById('content'));}

function _vesaFoto(id, idx) {
  const s=window._VESA.data.find(x=>x.id===id); if(!s) return;
  const foto=[s.foto1,s.foto2,s.foto3].filter(Boolean);
  openModal(`<div class="modal-title"><span>📷 Foto prova</span><span class="modal-close" onclick="closeModalDirect()">✕</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
      ${foto.map((f,i)=>`<img src="${f}" style="max-width:100%;max-height:55vh;border-radius:10px;border:1px solid var(--border);object-fit:contain">`).join('')}
    </div>`);
}

async function _vesaApprova(id) {
  if(!confirm('Approvare questa richiesta?')) return;
  try {
    await apiFetch('/admin/vestiario/'+id+'/stato',{method:'PATCH',body:JSON.stringify({stato_richiesta:'approvata'})});
    const s=window._VESA.data.find(x=>x.id===id); if(s){s.stato_richiesta='approvata';s.motivazione_admin=null;}
    showToast('✓ Richiesta approvata'); _vesaRender(document.getElementById('content'));
  } catch(e){showToast('Errore','error');}
}

async function _vesaNonApprova(id) {
  openModal(`<div class="modal-title"><span>❌ Non Approvazione</span><span class="modal-close" onclick="closeModalDirect()">✕</span></div>
    <div style="margin-bottom:14px;font-size:13px;color:var(--text-muted)">Inserisci la motivazione che verrà mostrata all'operatore:</div>
    <textarea id="vest_motiv_input" class="field-input" style="min-height:90px;margin-bottom:16px" placeholder="Es: Il capo non presenta usura sufficiente..."></textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModalDirect()">Annulla</button>
      <button class="btn btn-danger" onclick="_vesaNonApprovaConf('${id}')">❌ Conferma Non Approvazione</button>
    </div>`);
}

async function _vesaNonApprovaConf(id) {
  const motiv=document.getElementById('vest_motiv_input')?.value.trim();
  if(!motiv){showToast('Inserisci una motivazione','error');return;}
  try {
    await apiFetch('/admin/vestiario/'+id+'/stato',{method:'PATCH',body:JSON.stringify({stato_richiesta:'non_approvata',motivazione_admin:motiv})});
    const s=window._VESA.data.find(x=>x.id===id); if(s){s.stato_richiesta='non_approvata';s.motivazione_admin=motiv;}
    closeModalDirect(); showToast('✓ Richiesta non approvata'); _vesaRender(document.getElementById('content'));
  } catch(e){showToast('Errore','error');}
}

async function _vesaAddMag() {
  const tipo=document.getElementById('mag_tipo')?.value;
  const taglia=document.getElementById('mag_taglia')?.value;
  const qty=parseInt(document.getElementById('mag_qty')?.value)||0;
  if(!tipo||!taglia||qty<1){showToast('Compila tutti i campi','error');return;}
  try {
    await apiFetch('/admin/magazzino-vestiario',{method:'POST',body:JSON.stringify({tipo_capo:tipo,taglia,quantita:qty})});
    showToast('✓ Stock aggiornato');
    const mag=await apiFetch('/admin/magazzino-vestiario'); window._VESA.mag=mag;
    _vesaRender(document.getElementById('content'));
  } catch(e){showToast('Errore','error');}
}

window.addEventListener('load', () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(reg => {
      // Controlla subito se c'è una versione nuova
      reg.update();
      // Ricontrolla ogni 60 secondi
      setInterval(() => reg.update(), 60000);
      // Ricontrolla quando l'utente torna sull'app
      window.addEventListener('focus', () => reg.update());
      // Se trova un nuovo SW, ricarica la pagina automaticamente
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            window.location.reload();
          }
        });
      });
    }).catch(() => {});
  }
  // restore saved theme
  try {
    if(localStorage.getItem('alfa_theme')==='light') {
      document.body.classList.add('theme-light');
    }
  } catch(e){}
  runSplash(() => {
    document.getElementById('splash').style.opacity='0';
    document.getElementById('splash').style.transition='opacity 0.5s';
    setTimeout(() => {
      document.getElementById('splash').style.display='none';
      document.getElementById('app').style.display='block';
      document.getElementById('auth-screen').style.display='flex';
    }, 500);
  });
});
