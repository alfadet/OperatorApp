server {
    listen 80;
    server_name tuodominio.com www.tuodominio.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tuodominio.com www.tuodominio.com;

    # SSL - generato con: certbot --nginx -d tuodominio.com
    ssl_certificate     /etc/letsencrypt/live/tuodominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuodominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/operatorapp;
    index index.html;

    # Cache per le librerie JS
    location /libs/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Tutte le richieste vanno a index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sicurezza
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript;
}
